<!DOCTYPE html>
<html lang="en">
<head>
    <script src="builder.js" defer></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Build Your XI - Crickingo</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0a0e27;
            min-height: 100vh;
            padding: 20px;
            position: relative;
            overflow-x: hidden;
            width:100%;
        }

        body::before {
            content: '';
            position: absolute;
            width: 200%;
            height: 200%;
            background: 
                radial-gradient(circle at 20% 50%, rgba(120, 119, 198, 0.3) 0%, transparent 50%),
                radial-gradient(circle at 80% 80%, rgba(255, 121, 63, 0.3) 0%, transparent 50%),
                radial-gradient(circle at 40% 20%, rgba(138, 43, 226, 0.2) 0%, transparent 50%);
            animation: gradientShift 15s ease infinite;
            z-index: 0;
        }

        @keyframes gradientShift {
            0%, 100% { transform: translate(0, 0); }
            50% { transform: translate(-50px, -50px); }
        }

        .container {
            max-width: 1600px;
            margin: 0 auto;
            position: relative;
            z-index: 1;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 40px;
            animation: fadeInDown 0.8s ease;
        }

        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .header h1 {
            font-size: 4em;
            margin-bottom: 15px;
            background: linear-gradient(135deg, #667eea 0%, #ff6b9d 50%, #ffa400 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            font-weight: 900;
            letter-spacing: -2px;
            text-shadow: 0 0 80px rgba(102, 126, 234, 0.5);
        }

        .header p {
            font-size: 1.3em;
            opacity: 0.9;
            color: #e0e0e0;
            letter-spacing: 0.5px;
        }

        .game-layout {
            display: grid;
            grid-template-columns: 1fr 420px;
            gap: 25px;
            animation: fadeInUp 0.8s ease 0.2s both;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .glass-panel {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 30px;
            box-shadow: 
                0 20px 60px rgba(0, 0, 0, 0.4),
                inset 0 1px 0 rgba(255, 255, 255, 0.1);
            padding: 35px;
        }

        .players-section {
            animation: fadeInUp 0.6s ease 0.3s both;
        }

        .team-section {
            position: sticky;
            top: 20px;
            height: fit-content;
            animation: fadeInUp 0.6s ease 0.4s both;
        }

        .section-title {
            font-size: 1.8em;
            font-weight: 800;
            color: white;
            margin-bottom: 25px;
            letter-spacing: -0.5px;
        }

        .stats-bar {
            display: flex;
            justify-content: space-between;
            margin-bottom: 25px;
            padding: 20px;
            background: rgba(102, 126, 234, 0.15);
            border: 2px solid rgba(102, 126, 234, 0.3);
            border-radius: 20px;
            backdrop-filter: blur(10px);
        }

        .stat {
            text-align: center;
            flex: 1;
        }

        .stat-label {
            font-size: 0.85em;
            color: rgba(255, 255, 255, 0.7);
            margin-bottom: 8px;
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        .stat-value {
            font-size: 1.8em;
            font-weight: 800;
            color: white;
            letter-spacing: -1px;
        }

        .stat-value.over-budget {
            color: #ff6b9d;
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.08); }
        }

        .progress-bar {
            width: 100%;
            height: 10px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            overflow: hidden;
            margin-bottom: 25px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea, #ffa400);
            transition: width 0.4s ease;
            box-shadow: 0 0 20px rgba(102, 126, 234, 0.5);
        }

        .progress-fill.over {
            background: linear-gradient(90deg, #ff6b9d, #ff3860);
        }

        .filters {
            display: flex;
            gap: 12px;
            margin-bottom: 25px;
            flex-wrap: wrap;
        }

        .filter-btn {
            padding: 12px 24px;
            border: 2px solid rgba(255, 255, 255, 0.15);
            background: rgba(255, 255, 255, 0.05);
            border-radius: 15px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            font-weight: 700;
            font-size: 0.95em;
            color: rgba(255, 255, 255, 0.8);
            font-family: 'Inter', sans-serif;
            letter-spacing: 0.3px;
        }

        .filter-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(102, 126, 234, 0.5);
            color: white;
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.2);
        }

        .filter-btn.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-color: transparent;
            color: white;
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
        }

        .players-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            max-height: 650px;
            overflow-y: auto;
            padding-right: 10px;
        }

        .players-grid::-webkit-scrollbar {
            width: 8px;
        }

        .players-grid::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
        }

        .players-grid::-webkit-scrollbar-thumb {
            background: rgba(102, 126, 234, 0.5);
            border-radius: 10px;
        }

        .players-grid::-webkit-scrollbar-thumb:hover {
            background: rgba(102, 126, 234, 0.7);
        }

        .player-card {
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid rgba(255, 255, 255, 0.15);
            border-radius: 20px;
            padding: 20px;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
            backdrop-filter: blur(10px);
        }

        .player-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, #667eea, #764ba2, #ffa400);
            transform: scaleX(0);
            transition: transform 0.4s;
        }

        .player-card:hover {
            border-color: rgba(102, 126, 234, 0.5);
            transform: translateY(-5px);
            box-shadow: 0 15px 40px rgba(102, 126, 234, 0.3);
            background: rgba(255, 255, 255, 0.08);
        }

        .player-card:hover::before {
            transform: scaleX(1);
        }

        .player-card.selected {
            border-color: #2dd4bf;
            background: rgba(45, 212, 191, 0.1);
            box-shadow: 0 15px 40px rgba(45, 212, 191, 0.3);
        }

        .player-card.selected::before {
            background: #2dd4bf;
            transform: scaleX(1);
        }

        .player-card.disabled {
            opacity: 0.4;
            cursor: not-allowed;
            filter: grayscale(1);
        }

        .player-card.disabled:hover {
            transform: none;
            box-shadow: none;
        }

        .player-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 15px;
        }

        .player-name {
            font-weight: 800;
            font-size: 1.15em;
            color: white;
            line-height: 1.3;
            letter-spacing: -0.3px;
        }

        .player-price {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 8px 16px;
            border-radius: 12px;
            font-weight: 800;
            font-size: 0.95em;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.3);
            letter-spacing: 0.3px;
        }

        .player-card.selected .player-price {
            background: linear-gradient(135deg, #2dd4bf 0%, #14b8a6 100%);
            box-shadow: 0 4px 15px rgba(45, 212, 191, 0.3);
        }

        .player-role {
            display: inline-block;
            padding: 6px 14px;
            border-radius: 10px;
            font-size: 0.85em;
            font-weight: 700;
            margin-bottom: 12px;
            letter-spacing: 0.3px;
        }

        .role-batsman { 
            background: rgba(52, 152, 219, 0.2); 
            color: #3498db;
            border: 1px solid rgba(52, 152, 219, 0.4);
        }
        .role-bowler { 
            background: rgba(231, 76, 60, 0.2); 
            color: #e74c3c;
            border: 1px solid rgba(231, 76, 60, 0.4);
        }
        .role-all-rounder { 
            background: rgba(243, 156, 18, 0.2); 
            color: #f39c12;
            border: 1px solid rgba(243, 156, 18, 0.4);
        }
        .role-wicket-keeper { 
            background: rgba(155, 89, 182, 0.2); 
            color: #9b59b6;
            border: 1px solid rgba(155, 89, 182, 0.4);
        }

        .player-stats {
            display: flex;
            justify-content: space-between;
            font-size: 0.9em;
            gap: 10px;
        }

        .stat-item {
            text-align: center;
            flex: 1;
        }

        .stat-item-label {
            color: rgba(255, 255, 255, 0.6);
            font-size: 0.8em;
            margin-bottom: 4px;
            font-weight: 600;
        }

        .stat-item-value {
            font-weight: 800;
            color: white;
            font-size: 1.1em;
            letter-spacing: -0.3px;
        }

        .selected-team {
            margin-bottom: 20px;
        }

        .team-title {
            font-size: 1.3em;
            font-weight: 800;
            color: white;
            margin-bottom: 18px;
            letter-spacing: -0.5px;
        }

        .selected-player {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 14px 16px;
            margin-bottom: 12px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
        }

        .selected-player:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(102, 126, 234, 0.3);
            transform: translateX(5px);
        }

        .selected-player-info {
            flex: 1;
        }

        .selected-player-name {
            font-weight: 700;
            color: white;
            margin-bottom: 4px;
            letter-spacing: -0.2px;
        }

        .selected-player-role {
            font-size: 0.85em;
            color: rgba(255, 255, 255, 0.6);
            font-weight: 600;
        }

        .selected-player-price {
            font-weight: 800;
            color: #ffa400;
            margin-right: 12px;
            font-size: 1.05em;
            letter-spacing: -0.3px;
        }

        .remove-btn {
            background: rgba(255, 107, 157, 0.2);
            color: #ff6b9d;
            border: 1px solid rgba(255, 107, 157, 0.4);
            padding: 6px 14px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 0.85em;
            font-weight: 700;
            transition: all 0.3s;
            font-family: 'Inter', sans-serif;
        }

        .remove-btn:hover {
            background: rgba(255, 107, 157, 0.3);
            border-color: #ff6b9d;
            transform: scale(1.05);
        }

        .empty-slot {
            padding: 18px;
            text-align: center;
            color: rgba(255, 255, 255, 0.4);
            border: 2px dashed rgba(255, 255, 255, 0.15);
            border-radius: 15px;
            margin-bottom: 10px;
            font-weight: 600;
            letter-spacing: 0.3px;
        }

        .action-btn {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 15px;
            font-size: 1.1em;
            font-weight: 800;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            font-family: 'Inter', sans-serif;
            letter-spacing: 0.3px;
            position: relative;
            overflow: hidden;
        }

        .action-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.2) 0%, transparent 100%);
            opacity: 0;
            transition: opacity 0.4s;
        }

        .action-btn:hover::before {
            opacity: 1;
        }

        .check-team-btn {
            background: linear-gradient(135deg, #2dd4bf 0%, #14b8a6 100%);
            color: white;
            margin-bottom: 12px;
            box-shadow: 0 10px 30px rgba(45, 212, 191, 0.3);
        }

        .check-team-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 40px rgba(45, 212, 191, 0.4);
        }

        .check-team-btn:disabled {
            background: rgba(255, 255, 255, 0.1);
            cursor: not-allowed;
            color: rgba(255, 255, 255, 0.4);
            box-shadow: none;
        }

        .check-team-btn:disabled:hover {
            transform: none;
        }

        .reset-btn {
            background: rgba(255, 107, 157, 0.2);
            color: #ff6b9d;
            border: 2px solid rgba(255, 107, 157, 0.4);
            margin-bottom: 12px;
        }

        .reset-btn:hover {
            background: rgba(255, 107, 157, 0.3);
            border-color: #ff6b9d;
            transform: translateY(-3px);
        }

        .leaderboard-btn {
            background: rgba(255, 164, 0, 0.2);
            color: #ffa400;
            border: 2px solid rgba(255, 164, 0, 0.4);
        }

        .leaderboard-btn:hover {
            background: rgba(255, 164, 0, 0.3);
            border-color: #ffa400;
            transform: translateY(-3px);
        }

        .result-section {
            margin-top: 20px;
            padding: 25px;
            border-radius: 20px;
            text-align: center;
            backdrop-filter: blur(10px);
            border: 2px solid;
        }

        .result-section.success {
            background: rgba(45, 212, 191, 0.15);
            border-color: rgba(45, 212, 191, 0.4);
        }

        .result-section.failure {
            background: rgba(255, 107, 157, 0.15);
            border-color: rgba(255, 107, 157, 0.4);
        }

        .result-title {
            font-size: 1.6em;
            font-weight: 800;
            margin-bottom: 12px;
            letter-spacing: -0.5px;
        }

        .result-section.success .result-title {
            color: #2dd4bf;
        }

        .result-section.failure .result-title {
            color: #ff6b9d;
        }

        .result-message {
            font-size: 1.1em;
            color: white;
            font-weight: 600;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(10, 14, 39, 0.95);
            backdrop-filter: blur(10px);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .modal.show {
            display: flex;
        }

        .modal-content {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(30px);
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 30px;
            padding: 45px;
            max-width: 700px;
            width: 100%;
            max-height: 85vh;
            overflow-y: auto;
            box-shadow: 0 30px 80px rgba(0, 0, 0, 0.6);
        }

        .modal-content::-webkit-scrollbar {
            width: 8px;
        }

        .modal-content::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
        }

        .modal-content::-webkit-scrollbar-thumb {
            background: rgba(102, 126, 234, 0.5);
            border-radius: 10px;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 35px;
        }

        .modal-title {
            font-size: 2.2em;
            color: white;
            font-weight: 900;
            letter-spacing: -1px;
        }

        .close-modal {
            font-size: 2.5em;
            cursor: pointer;
            color: rgba(255, 255, 255, 0.6);
            background: none;
            border: none;
            padding: 0;
            width: 45px;
            height: 45px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            transition: all 0.3s;
            font-weight: 300;
        }

        .close-modal:hover {
            background: rgba(255, 255, 255, 0.1);
            color: white;
            transform: rotate(90deg);
        }

        .leaderboard-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 18px 20px;
            margin-bottom: 12px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            transition: all 0.3s;
            backdrop-filter: blur(10px);
        }

        .leaderboard-row:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(102, 126, 234, 0.3);
            transform: translateX(5px);
        }

        .leaderboard-row.top-3 {
            background: linear-gradient(135deg, rgba(255, 215, 0, 0.2) 0%, rgba(255, 237, 78, 0.2) 100%);
            border-color: rgba(255, 215, 0, 0.4);
        }

        .leaderboard-row.top-3:nth-child(2) {
            background: linear-gradient(135deg, rgba(192, 192, 192, 0.2) 0%, rgba(232, 232, 232, 0.2) 100%);
            border-color: rgba(192, 192, 192, 0.4);
        }

        .leaderboard-row.top-3:nth-child(3) {
            background: linear-gradient(135deg, rgba(205, 127, 50, 0.2) 0%, rgba(212, 165, 116, 0.2) 100%);
            border-color: rgba(205, 127, 50, 0.4);
        }

        .leaderboard-row.you {
            background: rgba(45, 212, 191, 0.15);
            border: 2px solid rgba(45, 212, 191, 0.5);
        }

        .leaderboard-rank {
            font-size: 1.6em;
            font-weight: 900;
            color: white;
            min-width: 55px;
            letter-spacing: -1px;
        }

        .leaderboard-info {
            flex: 1;
            margin: 0 18px;
        }

        .leaderboard-name {
            font-size: 1.15em;
            font-weight: 700;
            color: white;
            margin-bottom: 5px;
            letter-spacing: -0.3px;
        }

        .leaderboard-date {
            font-size: 0.85em;
            color: rgba(255, 255, 255, 0.6);
            font-weight: 600;
        }

        .leaderboard-score {
            font-size: 1.4em;
            font-weight: 800;
            color: #ffa400;
            letter-spacing: -0.5px;
        }

        .name-input-section {
            margin-top: 25px;
            padding: 25px;
            background: rgba(255, 164, 0, 0.15);
            border-radius: 20px;
            border: 2px solid rgba(255, 164, 0, 0.3);
        }

        .name-input-section h3 {
            color: #ffa400;
            margin-bottom: 18px;
            font-weight: 800;
            font-size: 1.2em;
            letter-spacing: -0.3px;
        }

        .name-input-group {
            display: flex;
            gap: 12px;
        }

        .name-input {
            flex: 1;
            padding: 14px 16px;
            border: 2px solid rgba(255, 164, 0, 0.3);
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            font-size: 1em;
            color: white;
            font-family: 'Inter', sans-serif;
            font-weight: 600;
            transition: all 0.3s;
        }

        .name-input:focus {
            outline: none;
            border-color: #ffa400;
            background: rgba(255, 255, 255, 0.08);
        }

        .name-input::placeholder {
            color: rgba(255, 255, 255, 0.4);
        }

        .submit-score-btn {
            padding: 14px 32px;
            background: linear-gradient(135deg, #2dd4bf 0%, #14b8a6 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-weight: 800;
            cursor: pointer;
            transition: all 0.3s;
            font-family: 'Inter', sans-serif;
            font-size: 1em;
        }

        .submit-score-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(45, 212, 191, 0.3);
        }

        .loading {
            text-align: center;
            padding: 50px;
            color: rgba(255, 255, 255, 0.6);
            font-size: 1.15em;
            font-weight: 600;
        }

        .empty-leaderboard {
            text-align: center;
            padding: 50px;
            color: rgba(255, 255, 255, 0.5);
            font-weight: 600;
        }

        .medal {
            font-size: 1.6em;
            margin-right: 12px;
        }

        @media (max-width: 1200px) {
            .game-layout {
                grid-template-columns: 1fr;
            }
            
            .team-section {
                position: relative;
                top: 0;
            }
        }

        @media (max-width: 768px) {
            .header h1 {
                font-size: 2.8em;
            }

            .header p {
                font-size: 1.1em;
            }

            .glass-panel {
                padding: 25px;
            }

            .players-grid {
                grid-template-columns: 1fr;
            }

            .stats-bar {
                flex-direction: column;
                gap: 15px;
            }

            .modal-content {
                padding: 30px 20px;
            }
        }

        @media (max-width: 480px) {
            .header h1 {
                font-size: 2.2em;
            }

            .glass-panel {
                padding: 20px;
            }

            .name-input-group {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🏏 Build Your XI</h1>
            <p>Select 11 players within budget. Team rating must reach 750+ to win!</p>
        </div>
        
        <div class="game-layout">
            <div class="glass-panel players-section">
                <h2 class="section-title">Available Players</h2>
                
                <div class="filters">
                                        <button class="filter-btn active" onclick="filterPlayers('All')">All</button>
                    <button class="filter-btn" onclick="filterPlayers('Batsman')">Batsmen</button>
                    <button class="filter-btn" onclick="filterPlayers('Bowler')">Bowlers</button>
                    <button class="filter-btn" onclick="filterPlayers('All-Rounder')">All-Rounders</button>
                    <button class="filter-btn" onclick="filterPlayers('Wicket-Keeper')">Keepers</button>
                </div>
                
                <div class="players-grid" id="playersGrid"></div>
            </div>
            
            <div class="team-section">
                <div class="stats-bar">
                    <div class="stat">
                        <div class="stat-label">Budget Left</div>
                        <div class="stat-value" id="budgetLeft">100</div>
                    </div>
                    <div class="stat">
                        <div class="stat-label">Players</div>
                        <div class="stat-value" id="playerCount">0/11</div>
                    </div>
                    <div class="stat">
                        <div class="stat-label">Team Rating</div>
                        <div class="stat-value" id="teamRating">0</div>
                    </div>
                </div>
                
                <div class="progress-bar">
                    <div class="progress-fill" id="ratingProgress"></div>
                </div>
                
                <div class="selected-team">
                    <div class="team-title">Your Team</div>
                    <div id="selectedPlayers"></div>
                </div>
                
                <button class="check-team-btn" id="checkBtn" onclick="checkTeam()" disabled>Check Team</button>
                <button class="reset-btn" onclick="resetTeam()">Reset Team</button>
                
                <div id="result"></div>
            </div>
        </div>
    </div>
    <script>
      window.va = window.va || function () { (window.vaq = window.vaq || []).push(arguments); };
    </script>
    <script defer src="/_vercel/insights/script.js"></script>
</body>
</html>
