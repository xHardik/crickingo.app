<!DOCTYPE html>
<html lang="en">
<head>
    <script src="wordle.js" defer></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cricket Wordle - Crickingo</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0a0e27;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            position: relative;
            overflow-x: hidden;
            width:100%;
        }

        body::before {
            content: '';
            position: absolute;
            width: 200%;
            height: 200%;
            background: 
                radial-gradient(circle at 20% 50%, rgba(120, 119, 198, 0.3) 0%, transparent 50%),
                radial-gradient(circle at 80% 80%, rgba(255, 121, 63, 0.3) 0%, transparent 50%),
                radial-gradient(circle at 40% 20%, rgba(138, 43, 226, 0.2) 0%, transparent 50%);
            animation: gradientShift 15s ease infinite;
            z-index: 0;
        }

        @keyframes gradientShift {
            0%, 100% { transform: translate(0, 0); }
            50% { transform: translate(-50px, -50px); }
        }

        .container {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 30px;
            padding: 50px 40px;
            box-shadow: 
                0 20px 60px rgba(0, 0, 0, 0.4),
                inset 0 1px 0 rgba(255, 255, 255, 0.1);
            max-width: 550px;
            width: 100%;
            position: relative;
            z-index: 1;
            animation: fadeInUp 0.8s ease;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        h1 {
            text-align: center;
            background: linear-gradient(135deg, #667eea 0%, #ff6b9d 50%, #ffa400 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 10px;
            font-size: 3em;
            font-weight: 900;
            letter-spacing: -1px;
        }

        .subtitle {
            text-align: center;
            color: rgba(255, 255, 255, 0.8);
            margin-bottom: 35px;
            font-size: 1.05em;
            line-height: 1.5;
        }

        .game-board {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 35px;
        }

        .row {
            display: flex;
            gap: 8px;
            justify-content: center;
        }

        .tile {
            width: 55px;
            height: 55px;
            border: 2px solid rgba(255, 255, 255, 0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.6em;
            font-weight: bold;
            text-transform: uppercase;
            border-radius: 10px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            background: rgba(255, 255, 255, 0.05);
            color: white;
            backdrop-filter: blur(10px);
        }

        .tile.correct {
            background: linear-gradient(135deg, #38ef7d 0%, #11998e 100%);
            border-color: #38ef7d;
            color: white;
            box-shadow: 0 6px 25px rgba(56, 239, 125, 0.6),
                        inset 0 1px 0 rgba(255, 255, 255, 0.3);
            font-weight: 900;
        }

        .tile.present {
            background: linear-gradient(135deg, #ffa400 0%, #ff6b00 100%);
            border-color: #ffa400;
            color: white;
            box-shadow: 0 6px 25px rgba(255, 164, 0, 0.6),
                        inset 0 1px 0 rgba(255, 255, 255, 0.3);
            font-weight: 900;
        }

        .tile.absent {
            background: linear-gradient(135deg, #4a5568 0%, #2d3748 100%);
            border-color: #4a5568;
            color: rgba(255, 255, 255, 0.8);
            box-shadow: 0 4px 15px rgba(74, 85, 104, 0.4);
        }

        .tile.filled {
            border-color: rgba(102, 126, 234, 0.5);
            background: rgba(102, 126, 234, 0.15);
            animation: pop 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .tile.filled.correct {
            background: linear-gradient(135deg, #38ef7d 0%, #11998e 100%);
            border-color: #38ef7d;
            box-shadow: 0 6px 25px rgba(56, 239, 125, 0.6),
                        inset 0 1px 0 rgba(255, 255, 255, 0.3);
        }

        .tile.filled.present {
            background: linear-gradient(135deg, #ffa400 0%, #ff6b00 100%);
            border-color: #ffa400;
            box-shadow: 0 6px 25px rgba(255, 164, 0, 0.6),
                        inset 0 1px 0 rgba(255, 255, 255, 0.3);
        }

        .tile.filled.absent {
            background: linear-gradient(135deg, #4a5568 0%, #2d3748 100%);
            border-color: #4a5568;
            box-shadow: 0 4px 15px rgba(74, 85, 104, 0.4);
        }

        @keyframes pop {
            0% { transform: scale(1); }
            50% { transform: scale(1.15); }
            100% { transform: scale(1); }
        }

        .input-section {
            display: flex;
            gap: 12px;
            margin-bottom: 25px;
        }

        input {
            flex: 1;
            padding: 16px 18px;
            font-size: 1.1em;
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 12px;
            text-transform: uppercase;
            outline: none;
            background: rgba(255, 255, 255, 0.1);
            color: white;
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
            font-family: inherit;
            font-weight: 600;
        }

        input::placeholder {
            color: rgba(255, 255, 255, 0.5);
            text-transform: none;
        }

        input:focus {
            border-color: #667eea;
            background: rgba(255, 255, 255, 0.15);
            box-shadow: 0 0 25px rgba(102, 126, 234, 0.3);
        }

        button {
            padding: 16px 32px;
            font-size: 1.05em;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 700;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.3);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.5);
        }

        button:active {
            transform: translateY(0);
        }

        button:disabled {
            background: rgba(255, 255, 255, 0.1);
            cursor: not-allowed;
            opacity: 0.5;
            transform: none;
            box-shadow: none;
        }

        .message {
            text-align: center;
            padding: 18px 20px;
            border-radius: 15px;
            margin-bottom: 25px;
            font-weight: 700;
            display: none;
            backdrop-filter: blur(10px);
            border: 2px solid;
            animation: slideIn 0.4s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message.show {
            display: block;
        }

        .message.success {
            background: rgba(56, 239, 125, 0.25);
            color: #38ef7d;
            border-color: #38ef7d;
            box-shadow: 0 6px 20px rgba(56, 239, 125, 0.4);
        }

        .message.error {
            background: rgba(220, 53, 69, 0.2);
            color: #ff6b6b;
            border-color: #dc3545;
            box-shadow: 0 4px 15px rgba(220, 53, 69, 0.3);
        }

        .message.info {
            background: rgba(102, 126, 234, 0.2);
            color: #667eea;
            border-color: #667eea;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.3);
        }

        .stats {
            text-align: center;
            color: rgba(255, 255, 255, 0.8);
            font-size: 1.05em;
            font-weight: 600;
            padding: 15px;
            background: rgba(102, 126, 234, 0.15);
            border-radius: 12px;
            border: 2px solid rgba(102, 126, 234, 0.3);
        }

        .reset-btn {
            width: 100%;
            margin-top: 25px;
            background: linear-gradient(135deg, #ff6b9d 0%, #ffa400 100%);
            box-shadow: 0 4px 15px rgba(255, 107, 157, 0.3);
        }

        .reset-btn:hover {
            box-shadow: 0 6px 20px rgba(255, 107, 157, 0.5);
        }

        .back-btn {
            width: 100%;
            margin-top: 12px;
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid rgba(255, 255, 255, 0.2);
            box-shadow: none;
        }

        .back-btn:hover {
            background: rgba(255, 255, 255, 0.15);
            border-color: rgba(255, 255, 255, 0.3);
            box-shadow: 0 4px 15px rgba(255, 255, 255, 0.1);
        }

        @media (max-width: 600px) {
            .container {
                padding: 35px 25px;
            }

            h1 {
                font-size: 2.3em;
            }

            .subtitle {
                font-size: 0.95em;
            }

            .tile {
                width: 45px;
                height: 45px;
                font-size: 1.3em;
            }

            .row {
                gap: 6px;
            }

            .game-board {
                gap: 8px;
            }

            input {
                padding: 14px 16px;
                font-size: 1em;
            }

            button {
                padding: 14px 24px;
                font-size: 1em;
            }
        }

        @media (max-width: 400px) {
            h1 {
                font-size: 2em;
            }

            .tile {
                width: 38px;
                height: 38px;
                font-size: 1.1em;
            }

            .input-section {
                flex-direction: column;
            }

            button {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🏏 Cricket Wordle</h1>
        <p class="subtitle">Guess the cricket player's name in 5 tries!</p>
        
        <div class="message" id="message"></div>
        
        <div class="game-board" id="gameBoard"></div>
        
        <div class="input-section">
            <input 
                type="text" 
                id="guessInput" 
                placeholder="Enter player name"
                maxlength="15"
            >
            <button id="submitBtn" onclick="submitGuess()">Submit</button>
        </div>
        
        <div class="stats" id="stats">Attempts: 0/5</div>
        
        <button class="reset-btn" onclick="resetGame()">🔄 New Game</button>
        <button class="back-btn" onclick="location.href='index.html'">← Back to Menu</button>
    </div>
 </body>
 </html>
