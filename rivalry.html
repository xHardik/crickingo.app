<!DOCTYPE html>
<html lang="en">
<head>
  <script src="rivalry.js" defer></script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rivalry Grid - Crickingo</title>
  
    <link rel="icon" type="image/png" href="logo.png">
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Inter', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #0a0e27;
      min-height: 100vh;
      padding: 20px;
      position: relative;
      overflow-x: hidden;
      width:100%;
    }

    body::before {
      content: '';
      position: absolute;
      width: 200%;
      height: 200%;
      background: 
        radial-gradient(circle at 20% 50%, rgba(120, 119, 198, 0.3) 0%, transparent 50%),
        radial-gradient(circle at 80% 80%, rgba(255, 121, 63, 0.3) 0%, transparent 50%),
        radial-gradient(circle at 40% 20%, rgba(138, 43, 226, 0.2) 0%, transparent 50%);
      animation: gradientShift 15s ease infinite;
      z-index: 0;
    }

    @keyframes gradientShift {
      0%, 100% { transform: translate(0, 0); }
      50% { transform: translate(-50px, -50px); }
    }

    .container {
      max-width: 950px;
      margin: 0 auto;
      position: relative;
      z-index: 1;
    }

    .header {
      text-align: center;
      color: white;
      margin-bottom: 30px;
      animation: fadeInDown 0.8s ease;
    }

    @keyframes fadeInDown {
      from {
        opacity: 0;
        transform: translateY(-30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .header h1 {
      font-size: 3.5em;
      margin-bottom: 10px;
      background: linear-gradient(135deg, #667eea 0%, #ff6b9d 50%, #ffa400 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      font-weight: 900;
      letter-spacing: -2px;
      text-shadow: 0 0 80px rgba(102, 126, 234, 0.5);
    }

    .header p {
      font-size: 1.2em;
      color: #e0e0e0;
      opacity: 0.9;
    }

    .game-info {
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(20px);
      border: 2px solid rgba(255, 255, 255, 0.1);
      border-radius: 25px;
      padding: 30px;
      margin-bottom: 25px;
      box-shadow: 
        0 20px 60px rgba(0, 0, 0, 0.4),
        inset 0 1px 0 rgba(255, 255, 255, 0.1);
      animation: fadeInUp 0.8s ease 0.2s both;
    }

    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .game-info h2 {
      color: white;
      margin-bottom: 8px;
      font-size: 1.8em;
      font-weight: 800;
    }

    .game-info .subtitle {
      color: rgba(255, 255, 255, 0.7);
      margin-bottom: 20px;
      font-size: 1.05em;
    }

    .player-box {
      background: rgba(102, 126, 234, 0.15);
      border: 2px solid rgba(102, 126, 234, 0.3);
      padding: 20px;
      border-radius: 18px;
      backdrop-filter: blur(10px);
    }

    .player-box h3 {
      color: white;
      font-size: 1.4em;
      margin-bottom: 8px;
      font-weight: 700;
    }

    .player-box p {
      color: rgba(255, 255, 255, 0.8);
      margin-bottom: 15px;
      font-size: 1em;
    }

    .controls {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    .btn {
      padding: 12px 24px;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      font-size: 1em;
      font-weight: 700;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .btn-skip {
      background: linear-gradient(135deg, #ffc107 0%, #ff9800 100%);
      color: #1a1a1a;
    }

    .btn-skip:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(255, 193, 7, 0.4);
    }

    .btn-back {
      background: rgba(255, 255, 255, 0.1);
      color: white;
      border: 2px solid rgba(255, 255, 255, 0.2);
    }

    .btn-back:hover {
      background: rgba(255, 255, 255, 0.15);
      border-color: rgba(255, 255, 255, 0.3);
      transform: translateY(-2px);
    }

    .btn-restart {
      background: linear-gradient(135deg, #28a745 0%, #20c997 100%);
      color: white;
    }

    .btn-restart:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(40, 167, 69, 0.4);
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
      margin: 25px 0;
      animation: fadeInUp 0.8s ease 0.4s both;
    }

    .cell {
      background: rgba(255, 255, 255, 0.08);
      border: 2px solid rgba(255, 255, 255, 0.15);
      border-radius: 15px;
      min-height: 120px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-size: 0.85em;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      padding: 12px;
      text-align: center;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
      gap: 10px;
      backdrop-filter: blur(10px);
      position: relative;
      overflow: hidden;
    }

    .cell::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: linear-gradient(135deg, rgba(102, 126, 234, 0.1) 0%, rgba(118, 75, 162, 0.1) 100%);
      opacity: 0;
      transition: opacity 0.3s;
    }

    .cell:hover::before {
      opacity: 1;
    }

    .cell-image {
      width: 50px;
      height: 50px;
      object-fit: contain;
      display: block;
      position: relative;
      z-index: 1;
      filter: drop-shadow(0 2px 4px rgba(0, 0, 0, 0.3));
    }

    .cell-text {
      font-size: 0.8em;
      line-height: 1.3;
      word-wrap: break-word;
      max-width: 100%;
      color: white;
      position: relative;
      z-index: 1;
    }

    .cell:hover:not([data-filled="true"]) {
      transform: translateY(-3px);
      border-color: rgba(102, 126, 234, 0.5);
      box-shadow: 0 8px 25px rgba(102, 126, 234, 0.4);
    }

    .cell.correct {
      background: linear-gradient(135deg, rgba(40, 167, 69, 0.3) 0%, rgba(32, 201, 151, 0.3) 100%);
      border-color: #28a745;
      box-shadow: 0 4px 20px rgba(40, 167, 69, 0.4);
    }

    .cell.correct::before {
      background: linear-gradient(135deg, rgba(40, 167, 69, 0.2) 0%, rgba(32, 201, 151, 0.2) 100%);
      opacity: 1;
    }

    .cell.wrong {
      background: linear-gradient(135deg, rgba(220, 53, 69, 0.3) 0%, rgba(255, 107, 107, 0.3) 100%);
      border-color: #dc3545;
      box-shadow: 0 4px 20px rgba(220, 53, 69, 0.4);
    }

    .cell.wrong::before {
      background: linear-gradient(135deg, rgba(220, 53, 69, 0.2) 0%, rgba(255, 107, 107, 0.2) 100%);
      opacity: 1;
    }

    .search-wrapper {
      position: relative;
      margin: 25px auto;
      max-width: 450px;
      animation: fadeInUp 0.8s ease 0.3s both;
    }

    .search-input {
      width: 100%;
      padding: 18px 20px;
      font-size: 1.1em;
      border: 2px solid rgba(255, 255, 255, 0.2);
      border-radius: 15px;
      background: rgba(255, 255, 255, 0.1);
      color: white;
      backdrop-filter: blur(10px);
      transition: all 0.3s ease;
      font-family: inherit;
    }

    .search-input::placeholder {
      color: rgba(255, 255, 255, 0.5);
    }

    .search-input:focus {
      outline: none;
      border-color: #667eea;
      background: rgba(255, 255, 255, 0.15);
      box-shadow: 0 0 25px rgba(102, 126, 234, 0.3);
    }

    .dropdown-list {
      position: absolute;
      width: 100%;
      max-height: 280px;
      overflow-y: auto;
      background: rgba(30, 30, 50, 0.95);
      backdrop-filter: blur(20px);
      border: 2px solid rgba(102, 126, 234, 0.4);
      border-radius: 15px;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
      z-index: 1000;
      display: none;
      margin-top: 8px;
    }

    .dropdown-list::-webkit-scrollbar {
      width: 8px;
    }

    .dropdown-list::-webkit-scrollbar-track {
      background: rgba(255, 255, 255, 0.05);
      border-radius: 10px;
    }

    .dropdown-list::-webkit-scrollbar-thumb {
      background: rgba(102, 126, 234, 0.5);
      border-radius: 10px;
    }

    .dropdown-list.active {
      display: block;
    }

    .dropdown-item {
      padding: 14px 18px;
      cursor: pointer;
      transition: all 0.2s;
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
      color: white;
    }

    .dropdown-item:hover {
      background: rgba(102, 126, 234, 0.3);
    }

    .dropdown-item:last-child {
      border-bottom: none;
    }

    .no-results {
      padding: 18px;
      text-align: center;
      color: rgba(255, 255, 255, 0.5);
    }

    .result {
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(20px);
      border: 2px solid rgba(255, 255, 255, 0.1);
      border-radius: 25px;
      padding: 40px;
      text-align: center;
      box-shadow: 
        0 20px 60px rgba(0, 0, 0, 0.4),
        inset 0 1px 0 rgba(255, 255, 255, 0.1);
      margin-top: 25px;
      animation: fadeInUp 0.6s ease;
    }

    .result h3 {
      background: linear-gradient(135deg, #667eea 0%, #ff6b9d 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      font-size: 2.2em;
      margin-bottom: 15px;
      font-weight: 900;
    }

    .result .score {
      font-size: 3em;
      background: linear-gradient(135deg, #ffd700 0%, #ffed4e 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      font-weight: 900;
      margin: 20px 0;
      filter: drop-shadow(0 0 20px rgba(255, 215, 0, 0.5));
    }

    .result .phrase {
      font-size: 1.3em;
      color: rgba(255, 255, 255, 0.9);
      margin: 20px 0 25px 0;
    }

    .result .btn {
      margin: 8px;
    }

   @media (max-width: 768px) {
  body {
    padding: 15px;
  }

  .header h1 {
    font-size: 2.5em;
  }

  .game-info {
    padding: 20px;
  }

  .result {
    padding: 30px 20px;
  }

  .result .score {
    font-size: 2.5em;
  }
}

/* Tablet/Large phones - 4 columns */
@media (min-width: 481px) and (max-width: 768px) {
  .grid {
    grid-template-columns: repeat(4, 1fr);
    gap: 8px;
  }

  .cell {
    min-height: 90px;
    font-size: 0.7em;
    padding: 8px;
  }

  .cell-image {
    width: 35px;
    height: 35px;
  }

  .cell-text {
    font-size: 0.75em;
  }
}

/* Small phones - 3 columns */
@media (max-width: 480px) {
  .header h1 {
    font-size: 2em;
  }

  .grid {
    grid-template-columns: repeat(4, 1fr);
    gap: 8px;
  }

  .cell {
    min-height: 85px;
    font-size: 0.65em;
    padding: 6px;
  }

  .cell-image {
    width: 32px;
    height: 32px;
  }

  .cell-text {
    font-size: 0.7em;
  }

  .controls {
    flex-direction: column;
  }

  .btn {
    width: 100%;
  }
}

/* Very small phones - 2 columns (fallback) */
@media (max-width: 360px) {
  .grid {
    grid-template-columns: repeat(2, 1fr);
  }
}
     
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>🏏 Crickingo</h1>
      <p>Rivalry Grid Challenge</p>
    </div>

    <div class="game-info">
      <h2 id="gridTitle">🔥 Rivalry Grid</h2>
      <p class="subtitle" id="gridSubtitle">CSK vs MI - The ultimate IPL rivalry</p>
      
      <div class="player-box">
        <h3 id="currentPlayer">Loading...</h3>
        <p id="playerCount">Player 1 of 9</p>
        <div class="controls">
          <button id="skipBtn" class="btn btn-skip" onclick="skipPlayer()">Skip Player</button>
          <button class="btn btn-back" onclick="backToMenu()">← Back to Menu</button>
        </div>
      </div>
    </div>

    <div class="search-wrapper">
      <input type="text" id="searchInput" class="search-input" placeholder="Type to search player..." autocomplete="off">
      <div id="dropdownList" class="dropdown-list"></div>
    </div>

    <div class="grid" id="gameGrid"></div>

    <div id="resultArea" style="display: none;" class="result">
      <h3>Game Over!</h3>
      <div class="score" id="scoreText"></div>
      <div class="phrase" id="resultPhrase"></div>
      <button class="btn btn-restart" onclick="restartGame()">Play Again</button>
      <button class="btn btn-back" onclick="backToMenu()">Back to Menu</button>
    </div>
  </div>
</body>
</html>
