<!DOCTYPE html>
<html lang="en">
<head>
  <script src="transfer.js" defer></script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Transfer History - Crickingo</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateX(-20px); }
      to { opacity: 1; transform: translateX(0); }
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
      min-height: 100vh;
      padding: 20px;
      position: relative;
      overflow-x: hidden;
      width:100%;
    }

    body::before {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: 
        radial-gradient(circle at 20% 50%, rgba(120, 119, 198, 0.3) 0%, transparent 50%),
        radial-gradient(circle at 80% 80%, rgba(138, 43, 226, 0.2) 0%, transparent 50%);
      pointer-events: none;
    }

    .container {
      max-width: 1100px;
      margin: 0 auto;
      position: relative;
      z-index: 1;
    }

    .header {
      text-align: center;
      color: white;
      margin-bottom: 40px;
      animation: fadeIn 0.6s ease-out;
    }

    .header h1 {
      font-size: 3em;
      margin-bottom: 10px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      font-weight: 800;
      letter-spacing: -1px;
    }

    .header p {
      font-size: 1.1em;
      opacity: 0.9;
      font-weight: 300;
    }

    .game-info {
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(10px);
      border-radius: 20px;
      padding: 25px;
      margin-bottom: 30px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
      border: 1px solid rgba(255, 255, 255, 0.18);
      animation: fadeIn 0.6s ease-out 0.1s backwards;
    }

    .game-info h2 {
      color: #ffd700;
      margin-bottom: 8px;
      font-size: 1.4em;
      font-weight: 600;
    }

    .game-info .subtitle {
      color: rgba(255, 255, 255, 0.7);
      margin-bottom: 20px;
      font-size: 0.95em;
    }

    .player-box {
      background: linear-gradient(135deg, rgba(102, 126, 234, 0.2) 0%, rgba(118, 75, 162, 0.2) 100%);
      padding: 20px;
      border-radius: 15px;
      border-left: 4px solid #667eea;
      backdrop-filter: blur(5px);
      transition: transform 0.3s ease;
    }

    .player-box:hover {
      transform: translateX(5px);
    }

    .player-box h3 {
      color: white;
      font-size: 1.4em;
      margin-bottom: 8px;
      font-weight: 600;
    }

    .player-box p {
      color: rgba(255, 255, 255, 0.8);
      font-size: 0.95em;
    }

    .btn {
      padding: 12px 24px;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      font-size: 1em;
      font-weight: 600;
      transition: all 0.3s ease;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
    }

    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(0, 0, 0, 0.3);
    }

    .btn:active {
      transform: translateY(0);
    }

    .btn-skip {
      background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
      color: white;
    }

    .btn-back {
      background: rgba(255, 255, 255, 0.1);
      color: white;
      border: 1px solid rgba(255, 255, 255, 0.2);
      backdrop-filter: blur(10px);
    }

    .btn-restart {
      background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
      color: white;
    }

    .transfer-layout {
      display: grid;
      grid-template-columns: 320px 1fr;
      gap: 25px;
      margin: 20px 0;
      animation: fadeIn 0.6s ease-out 0.2s backwards;
    }

    .transfer-history {
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(10px);
      border-radius: 20px;
      padding: 25px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
      border: 1px solid rgba(255, 255, 255, 0.18);
      max-height: 500px;
      overflow-y: auto;
    }

    .transfer-history::-webkit-scrollbar {
      width: 8px;
    }

    .transfer-history::-webkit-scrollbar-track {
      background: rgba(255, 255, 255, 0.1);
      border-radius: 10px;
    }

    .transfer-history::-webkit-scrollbar-thumb {
      background: rgba(102, 126, 234, 0.6);
      border-radius: 10px;
    }

    .transfer-history h3 {
      color: white;
      margin-bottom: 20px;
      font-size: 1.3em;
      font-weight: 600;
    }

    .transfer-item {
      background: rgba(255, 255, 255, 0.08);
      padding: 15px;
      border-radius: 12px;
      margin-bottom: 12px;
      border-left: 4px solid #667eea;
      transition: all 0.3s ease;
      animation: slideIn 0.4s ease-out;
    }

    .transfer-item:hover {
      background: rgba(255, 255, 255, 0.12);
      transform: translateX(5px);
    }

    .transfer-item .year {
      font-weight: 700;
      color: #ffd700;
      margin-bottom: 6px;
      font-size: 1.1em;
    }

    .transfer-item .team {
      color: rgba(255, 255, 255, 0.8);
      font-size: 0.95em;
    }

    .guess-area {
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(10px);
      border-radius: 20px;
      padding: 30px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
      border: 1px solid rgba(255, 255, 255, 0.18);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      min-height: 500px;
    }

    .guess-area h3 {
      color: white;
      margin-bottom: 25px;
      font-size: 1.5em;
      font-weight: 600;
    }

    .search-wrapper {
      width: 100%;
      max-width: 450px;
      position: relative;
    }

    .search-input {
      width: 100%;
      padding: 18px 20px;
      font-size: 1.1em;
      border: 2px solid rgba(255, 255, 255, 0.2);
      border-radius: 15px;
      margin-bottom: 20px;
      transition: all 0.3s ease;
      background: rgba(255, 255, 255, 0.1);
      color: white;
      backdrop-filter: blur(10px);
    }

    .search-input::placeholder {
      color: rgba(255, 255, 255, 0.5);
    }

    .search-input:focus {
      outline: none;
      border-color: #667eea;
      background: rgba(255, 255, 255, 0.15);
      box-shadow: 0 0 20px rgba(102, 126, 234, 0.4);
    }

    .dropdown-list {
      position: absolute;
      width: 100%;
      max-height: 280px;
      overflow-y: auto;
      background: rgba(30, 30, 60, 0.95);
      backdrop-filter: blur(10px);
      border: 2px solid rgba(102, 126, 234, 0.5);
      border-radius: 15px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
      z-index: 1000;
      display: none;
    }

    .dropdown-list::-webkit-scrollbar {
      width: 8px;
    }

    .dropdown-list::-webkit-scrollbar-track {
      background: rgba(255, 255, 255, 0.1);
      border-radius: 10px;
    }

    .dropdown-list::-webkit-scrollbar-thumb {
      background: rgba(102, 126, 234, 0.6);
      border-radius: 10px;
    }

    .dropdown-list.active {
      display: block;
      animation: fadeIn 0.2s ease-out;
    }

    .dropdown-item {
      padding: 15px 18px;
      cursor: pointer;
      transition: all 0.2s ease;
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
      color: white;
    }

    .dropdown-item:hover {
      background: rgba(102, 126, 234, 0.3);
      padding-left: 25px;
    }

    .dropdown-item:last-child {
      border-bottom: none;
    }

    .no-results {
      padding: 18px;
      text-align: center;
      color: rgba(255, 255, 255, 0.5);
    }

    .guess-btn {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      padding: 18px 50px;
      border-radius: 15px;
      font-size: 1.15em;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 0 8px 25px rgba(102, 126, 234, 0.4);
      position: relative;
      overflow: hidden;
    }

    .guess-btn::before {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      width: 0;
      height: 0;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.2);
      transform: translate(-50%, -50%);
      transition: width 0.6s, height 0.6s;
    }

    .guess-btn:hover::before {
      width: 300px;
      height: 300px;
    }

    .guess-btn:hover {
      transform: translateY(-3px);
      box-shadow: 0 12px 35px rgba(102, 126, 234, 0.6);
    }

    .guess-btn:active {
      transform: translateY(-1px);
    }

    .feedback {
      margin-top: 25px;
      padding: 18px 25px;
      border-radius: 15px;
      font-size: 1.15em;
      text-align: center;
      display: none;
      font-weight: 600;
      animation: pulse 0.5s ease;
    }

    .feedback.correct {
      background: rgba(40, 167, 69, 0.2);
      color: #5fffb0;
      border: 2px solid #28a745;
      display: block;
      box-shadow: 0 4px 20px rgba(40, 167, 69, 0.3);
    }

    .feedback.wrong {
      background: rgba(220, 53, 69, 0.2);
      color: #ff6b9d;
      border: 2px solid #dc3545;
      display: block;
      box-shadow: 0 4px 20px rgba(220, 53, 69, 0.3);
    }

    .attempts {
      margin-top: 18px;
      color: rgba(255, 255, 255, 0.7);
      font-size: 0.95em;
    }

    .result {
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(10px);
      border-radius: 20px;
      padding: 40px;
      text-align: center;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
      border: 1px solid rgba(255, 255, 255, 0.18);
      margin-top: 30px;
      animation: fadeIn 0.6s ease-out;
    }

    .result h3 {
      color: #ffd700;
      font-size: 2em;
      margin-bottom: 15px;
      font-weight: 700;
    }

    .result .score {
      font-size: 2.5em;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin: 20px 0;
      font-weight: 800;
    }

    .result .phrase {
      font-size: 1.3em;
      color: rgba(255, 255, 255, 0.8);
      margin-top: 15px;
      font-weight: 300;
    }

    .button-controls {
      text-align: center;
      margin-top: 25px;
      display: flex;
      gap: 15px;
      justify-content: center;
      animation: fadeIn 0.6s ease-out 0.3s backwards;
    }

    @media (max-width: 768px) {
      .transfer-layout {
        grid-template-columns: 1fr;
      }

      .header h1 {
        font-size: 2.2em;
      }

      .guess-area {
        min-height: auto;
        padding: 25px 20px;
      }

      .transfer-history {
        max-height: 300px;
      }

      .button-controls {
        flex-direction: column;
      }

      .btn {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>🏏 Crickingo</h1>
      <p>Transfer History Challenge</p>
    </div>

    <div class="game-info">
      <h2>🔄 Transfer History</h2>
      <p class="subtitle">Guess the player from their IPL journey</p>
      
      <div class="player-box">
        <h3 id="currentPlayer">Loading...</h3>
        <p id="playerCount">Player 1 of 5</p>
      </div>
    </div>

    <div class="transfer-layout">
      <div class="transfer-history">
        <h3>Transfer History</h3>
        <div id="transferList"></div>
      </div>
      <div class="guess-area">
        <h3>Who is this player?</h3>
        <div class="search-wrapper">
          <input type="text" id="searchInput" class="search-input" placeholder="Type to search player..." autocomplete="off">
          <div id="dropdownList" class="dropdown-list"></div>
        </div>
        <button class="guess-btn" onclick="submitGuess()">Submit Guess</button>
        <div id="feedback" class="feedback"></div>
        <div id="attempts" class="attempts"></div>
      </div>
    </div>

    <div class="button-controls">
      <button class="btn btn-skip" onclick="skipTransferPlayer()">Skip Player</button>
      <button class="btn btn-back" onclick="backToMenu()">← Back to Menu</button>
    </div>

    <div id="resultArea" style="display: none;" class="result">
      <h3>Game Over!</h3>
      <div class="score" id="scoreText"></div>
      <div class="phrase" id="resultPhrase"></div>
      <button class="btn btn-restart" onclick="restartGame()">Play Again</button>
      <button class="btn btn-back" onclick="backToMenu()">Back to Menu</button>
    </div>
  </div>
  <script>
    window.va = window.va || function () { (window.vaq = window.vaq || []).push(arguments); };
  </script>
  <script defer src="/_vercel/insights/script.js"></script>
</body>
</html>
