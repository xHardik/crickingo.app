<!DOCTYPE html>
<html lang="en">
<head>
  <script type="module" src="tour-match.js"></script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tournament — Crickingo</title>
  <link rel="icon" type="image/png" href="logo.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:      #060810;
      --surface: rgba(255,255,255,0.04);
      --border:  rgba(255,255,255,0.08);
      --accent:  #F7C344;
      --accent2: #E84040;
      --accent3: #4F8EF7;
      --green:   #3DD68C;
      --text:    #F2F2F2;
      --muted:   rgba(242,242,242,0.45);
      --radius:  16px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ── BACKGROUND ── */
    .bg-layer {
      position: fixed; inset: 0; z-index: 0; pointer-events: none;
      background:
        radial-gradient(ellipse 80% 50% at 15% 0%,  rgba(247,195,68,0.10) 0%, transparent 60%),
        radial-gradient(ellipse 60% 40% at 85% 100%, rgba(232,64,64,0.07)  0%, transparent 60%),
        radial-gradient(ellipse 50% 40% at 50% 50%,  rgba(79,142,247,0.04)  0%, transparent 70%);
    }
    .bg-layer::after {
      content: '';
      position: absolute; inset: 0;
      background-image: repeating-linear-gradient(
        -45deg, transparent, transparent 40px,
        rgba(255,255,255,0.010) 40px, rgba(255,255,255,0.010) 41px
      );
    }

    /* ── NAV ── */
    nav {
      position: sticky; top: 0; z-index: 100;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 40px; height: 64px;
      background: rgba(6,8,16,0.88);
      backdrop-filter: blur(24px);
      border-bottom: 1px solid var(--border);
      box-shadow: 0 0 40px rgba(168,85,247,0.12), 0 0 80px rgba(168,85,247,0.06);
    }

    .nav-logo {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.8rem; letter-spacing: 2px;
      background: linear-gradient(90deg, var(--accent), #fff 60%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
      text-decoration: none;
    }

    .nav-tag {
      font-size: 0.72rem; font-weight: 700;
      text-transform: uppercase; letter-spacing: 2px;
      color: var(--accent);
      background: rgba(247,195,68,0.1);
      border: 1px solid rgba(247,195,68,0.25);
      padding: 4px 14px; border-radius: 100px;
    }

    .nav-back {
      color: var(--muted); text-decoration: none;
      font-size: 0.88rem; font-weight: 500;
      transition: color 0.2s, transform 0.2s;
    }
    .nav-back:hover { color: var(--text); transform: translateX(-3px); }

    /* ── PAGE ── */
    .page {
      position: relative; z-index: 1;
      max-width: 880px; margin: 0 auto;
      padding: 48px 24px 100px;
    }

    /* ── HERO TITLE ── */
    .hero {
      text-align: center;
      margin-bottom: 48px;
      animation: fadeUp 0.6s ease both;
    }

    .hero-trophy {
      font-size: 3.5rem;
      display: block;
      margin-bottom: 12px;
      animation: float 3s ease-in-out infinite;
    }

    @keyframes float {
      0%,100% { transform: translateY(0); }
      50%      { transform: translateY(-8px); }
    }

    .hero h1 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(2.4rem, 6vw, 4rem);
      letter-spacing: 3px; line-height: 1;
      background: linear-gradient(135deg, var(--accent) 0%, #fff 50%, var(--accent3) 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
      margin-bottom: 8px;
    }

    .hero p {
      color: var(--muted); font-size: 0.9rem; letter-spacing: 0.5px;
    }

    /* ── SCREENS ── */
    .setup-screen, .lobby-screen, .game-screen, .results-screen { display: none; }
    .setup-screen.active, .lobby-screen.active, .game-screen.active, .results-screen.active { display: block; }

    /* ── GLASS CARD ── */
    .glass-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 32px;
      margin-bottom: 20px;
      position: relative; overflow: hidden;
    }

    .glass-card::before {
      content: '';
      position: absolute; top: 0; left: 0; right: 0; height: 2px;
      background: linear-gradient(90deg, var(--accent), var(--accent2), var(--accent3));
      border-radius: 20px 20px 0 0;
    }

    /* ── FORM ── */
    .form-group { margin-bottom: 20px; }

    .form-label {
      display: block; margin-bottom: 8px;
      font-size: 0.75rem; font-weight: 700;
      text-transform: uppercase; letter-spacing: 1.5px;
      color: var(--muted);
    }

    .form-input, .form-select {
      width: 100%;
      padding: 13px 16px;
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--border);
      border-radius: 12px;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.95rem;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .form-input::placeholder { color: var(--muted); }
    .form-input:focus, .form-select:focus {
      outline: none;
      border-color: rgba(247,195,68,0.5);
      box-shadow: 0 0 0 3px rgba(247,195,68,0.08);
    }

    .form-select option { background: #0d1120; color: var(--text); }

    /* ── DIVIDER ── */
    .or-divider {
      display: flex; align-items: center; gap: 16px;
      margin: 28px 0; color: var(--muted);
      font-size: 0.8rem; font-weight: 700; letter-spacing: 1px;
    }
    .or-divider::before, .or-divider::after {
      content: ''; flex: 1; height: 1px;
      background: var(--border);
    }

    /* ── BUTTONS ── */
    .btn {
      display: flex; align-items: center; justify-content: center; gap: 8px;
      width: 100%; padding: 15px 24px;
      border: none; border-radius: 12px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.92rem; font-weight: 800;
      cursor: pointer; transition: all 0.25s ease;
      text-transform: uppercase; letter-spacing: 0.5px;
      margin-top: 10px;
      position: relative; overflow: hidden;
    }

    .btn::after {
      content: '';
      position: absolute; inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.12), transparent);
      opacity: 0; transition: opacity 0.25s;
    }
    .btn:hover::after { opacity: 1; }

    .btn-primary {
      background: var(--accent); color: #000;
      box-shadow: 0 6px 24px rgba(247,195,68,0.25);
    }
    .btn-primary:hover {
      background: #ffd060;
      transform: translateY(-2px);
      box-shadow: 0 10px 32px rgba(247,195,68,0.35);
    }

    .btn-secondary {
      background: var(--surface);
      color: var(--text);
      border: 1px solid var(--border);
    }
    .btn-secondary:hover {
      border-color: rgba(247,195,68,0.35);
      transform: translateY(-2px);
    }

    .btn-green {
      background: var(--green); color: #000;
      box-shadow: 0 6px 24px rgba(61,214,140,0.25);
    }
    .btn-green:hover {
      background: #5cf0a8;
      transform: translateY(-2px);
      box-shadow: 0 10px 32px rgba(61,214,140,0.35);
    }

    .btn:disabled {
      opacity: 0.4; cursor: not-allowed; transform: none !important;
    }

    /* ── TOURNAMENT CODE BOX ── */
    .code-box {
      background: rgba(247,195,68,0.07);
      border: 1px solid rgba(247,195,68,0.25);
      border-radius: var(--radius);
      padding: 28px;
      text-align: center;
      margin-bottom: 24px;
    }

    .code-label {
      font-size: 0.72rem; font-weight: 700;
      text-transform: uppercase; letter-spacing: 2px;
      color: var(--muted); margin-bottom: 12px;
    }

    .code {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 3.5rem; letter-spacing: 8px;
      background: linear-gradient(135deg, var(--accent), #ffd700);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
      line-height: 1;
    }

    .code-hint {
      font-size: 0.78rem; color: var(--muted);
      margin-top: 10px;
    }

    /* ── PLAYER LIST ── */
    .player-list {
      display: flex; flex-direction: column; gap: 10px;
      margin-bottom: 24px;
    }

    .player-item {
      display: flex; align-items: center; gap: 14px;
      padding: 14px 18px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      transition: border-color 0.2s;
    }

    .player-item.host { border-color: rgba(247,195,68,0.3); }

    .player-avatar {
      width: 38px; height: 38px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1rem; letter-spacing: 1px;
      flex-shrink: 0;
      background: rgba(247,195,68,0.15);
      border: 1px solid rgba(247,195,68,0.3);
      color: var(--accent);
    }

    .player-info { flex: 1; }

    .player-name {
      font-weight: 700; font-size: 0.92rem; color: var(--text);
    }

    .player-status {
      font-size: 0.7rem; font-weight: 600;
      text-transform: uppercase; letter-spacing: 1px;
      color: var(--green); margin-top: 2px;
    }

    .player-badge {
      font-size: 0.65rem; font-weight: 700;
      text-transform: uppercase; letter-spacing: 1px;
      padding: 3px 10px; border-radius: 100px;
      background: rgba(247,195,68,0.12);
      border: 1px solid rgba(247,195,68,0.25);
      color: var(--accent);
    }

    .empty-slot {
      padding: 14px 18px;
      border: 1px dashed rgba(255,255,255,0.1);
      border-radius: 12px;
      color: var(--muted);
      font-size: 0.82rem;
      font-weight: 600;
      text-align: center;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .waiting-label {
      text-align: center;
      color: var(--muted);
      font-size: 0.82rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      margin-bottom: 20px;
      display: flex; align-items: center; justify-content: center; gap: 8px;
    }

    .waiting-dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: var(--accent);
      animation: blink 1.2s ease-in-out infinite;
    }
    .waiting-dot:nth-child(2) { animation-delay: 0.2s; }
    .waiting-dot:nth-child(3) { animation-delay: 0.4s; }

    @keyframes blink {
      0%,100% { opacity: 0.2; transform: scale(0.8); }
      50%      { opacity: 1;   transform: scale(1.2); }
    }

    /* ── GAME PROGRESS ── */
    .section-label {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.1rem; letter-spacing: 3px;
      color: var(--accent);
      margin-bottom: 16px;
      display: flex; align-items: center; gap: 10px;
    }

    .section-label::after {
      content: ''; flex: 1; height: 1px;
      background: var(--border);
    }

    .game-progress { margin-bottom: 28px; }

    .game-item {
      display: flex; align-items: center; gap: 16px;
      padding: 16px 20px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      margin-bottom: 10px;
      transition: border-color 0.2s;
    }

    .game-item.completed { border-color: rgba(61,214,140,0.3); }
    .game-item.active    { border-color: rgba(247,195,68,0.5);
                           box-shadow: 0 0 20px rgba(247,195,68,0.08); }

    .game-number {
      width: 40px; height: 40px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.1rem; letter-spacing: 1px;
      flex-shrink: 0;
      border: 2px solid var(--border);
      color: var(--muted);
    }

    .game-item.completed .game-number {
      background: rgba(61,214,140,0.15);
      border-color: var(--green);
      color: var(--green);
    }

    .game-item.active .game-number {
      background: rgba(247,195,68,0.15);
      border-color: var(--accent);
      color: var(--accent);
      animation: pulse 1.4s ease-in-out infinite;
    }

    @keyframes pulse {
      0%,100% { transform: scale(1); box-shadow: none; }
      50%      { transform: scale(1.08); box-shadow: 0 0 12px rgba(247,195,68,0.4); }
    }

    .game-info { flex: 1; }

    .game-name {
      font-weight: 700; font-size: 0.92rem; color: var(--text);
    }

    .game-status {
      font-size: 0.72rem; font-weight: 600;
      text-transform: uppercase; letter-spacing: 1px;
      color: var(--muted); margin-top: 3px;
    }

    .game-item.completed .game-status { color: var(--green); }
    .game-item.active    .game-status { color: var(--accent); }

    .game-check {
      font-size: 1.1rem;
      opacity: 0; transition: opacity 0.3s;
    }
    .game-item.completed .game-check { opacity: 1; }

    /* ── WAITING / GAME FRAME ── */
    #waitingMessage {
      text-align: center;
      padding: 40px 20px;
      color: var(--muted);
      font-size: 0.9rem;
      line-height: 1.7;
    }

    #waitingMessage strong {
      color: var(--accent);
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.4rem; letter-spacing: 2px;
      display: block; margin-bottom: 8px;
    }

    #gameFrame {
      text-align: center;
      padding: 20px 0;
    }

    #gameFrame a, #gameFrame button {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 14px 36px;
      background: var(--accent); color: #000;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.92rem; font-weight: 800;
      text-transform: uppercase; letter-spacing: 0.5px;
      border: none; border-radius: 12px;
      text-decoration: none; cursor: pointer;
      transition: all 0.25s;
      box-shadow: 0 6px 24px rgba(247,195,68,0.25);
    }
    #gameFrame a:hover, #gameFrame button:hover {
      background: #ffd060; transform: translateY(-2px);
      box-shadow: 0 10px 32px rgba(247,195,68,0.35);
    }

    /* ── SCORE INPUT ── */
    #scoreInputSection {
      padding: 24px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      margin-top: 20px;
    }

    /* ── SCOREBOARD ── */
    .scoreboard-header {
      text-align: center;
      margin-bottom: 32px;
      animation: fadeUp 0.5s ease both;
    }

    .scoreboard-header .trophy-big {
      font-size: 4rem;
      display: block; margin-bottom: 12px;
      animation: float 3s ease-in-out infinite;
    }

    .scoreboard-header h2 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(2rem, 5vw, 3rem);
      letter-spacing: 3px;
      background: linear-gradient(135deg, var(--accent), #fff 60%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }

    .scoreboard { display: flex; flex-direction: column; gap: 12px; margin-bottom: 32px; }

    .score-item {
      display: flex; align-items: center; gap: 16px;
      padding: 18px 22px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      animation: fadeUp 0.5s ease both;
      transition: transform 0.2s;
    }

    .score-item:hover { transform: translateX(4px); }

    .score-item.winner {
      background: rgba(247,195,68,0.1);
      border-color: rgba(247,195,68,0.45);
      box-shadow: 0 0 32px rgba(247,195,68,0.12);
    }

    .score-item:nth-child(1) { animation-delay: 0.05s; }
    .score-item:nth-child(2) { animation-delay: 0.1s; }
    .score-item:nth-child(3) { animation-delay: 0.15s; }
    .score-item:nth-child(4) { animation-delay: 0.2s; }

    .rank {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.6rem; letter-spacing: 1px;
      width: 36px; text-align: center; flex-shrink: 0;
      color: var(--muted);
    }
    .score-item.winner .rank { color: var(--accent); }

    .rank-medal {
      font-size: 1.4rem; width: 36px;
      text-align: center; flex-shrink: 0;
    }

    .score-name {
      flex: 1;
      font-weight: 700; font-size: 0.95rem;
      color: var(--text);
    }

    .score-item.winner .score-name { color: var(--accent); }

    .score-val {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.5rem; letter-spacing: 1px;
      color: var(--green);
    }
    .score-item.winner .score-val { color: var(--accent); }

    /* ── INFO TEXT ── */
    .info-text {
      text-align: center;
      color: var(--muted);
      font-size: 0.82rem;
      margin-bottom: 16px;
    }

    /* ── ANIMATIONS ── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(18px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── RESPONSIVE ── */
    @media (max-width: 600px) {
      nav { padding: 0 16px; }
      .page { padding: 28px 16px 80px; }
      .glass-card { padding: 24px 20px; }
      .code { font-size: 2.6rem; letter-spacing: 5px; }
      .hero h1 { font-size: 2.2rem; }
    }
  </style>
</head>
<body>

  <div class="bg-layer"></div>

  <!-- ── NAV ── -->
  <nav>
    <a href="index.html" class="nav-logo">🏏 Crickingo</a>
    <span class="nav-tag">🏆 Tournament</span>
    <a href="index.html" class="nav-back">← Home</a>
  </nav>

  <!-- ── PAGE ── -->
  <main class="page">

    <!-- HERO -->
    <div class="hero">
      <span class="hero-trophy">🏆</span>
      <h1>Game Tournament</h1>
      <p>Compete across all games. Highest combined score wins.</p>
    </div>

    <!-- ══ SETUP SCREEN ══ -->
    <div class="setup-screen active" id="setupScreen">

      <div class="glass-card">
        <div class="section-label">Create Tournament</div>

        <div class="form-group">
          <label class="form-label">Tournament Name</label>
          <input class="form-input" type="text" id="tournamentName" placeholder="Epic Tournament" value="Epic Tournament">
        </div>

        <div class="form-group">
          <label class="form-label">Number of Players</label>
          <select class="form-select" id="playerCount">
            <option value="2">2 Players</option>
            <option value="3">3 Players</option>
            <option value="4">4 Players</option>
          </select>
        </div>

        <div class="form-group">
          <label class="form-label">Your Name</label>
          <input class="form-input" type="text" id="hostName" placeholder="Enter your name">
        </div>

        <button class="btn btn-primary" id="createTournamentBtn">🚀 Create Tournament</button>
      </div>

      <div class="or-divider">OR</div>

      <div class="glass-card">
        <div class="section-label">Join Tournament</div>

        <div class="form-group">
          <label class="form-label">Tournament Code</label>
          <input class="form-input" type="text" id="joinCode" placeholder="Enter 6-digit code" style="text-transform:uppercase;letter-spacing:4px;font-family:'Bebas Neue',sans-serif;font-size:1.3rem;">
        </div>

        <div class="form-group">
          <label class="form-label">Your Name</label>
          <input class="form-input" type="text" id="joinName" placeholder="Enter your name">
        </div>

        <button class="btn btn-secondary" id="joinTournamentBtn">→ Join Tournament</button>
      </div>

    </div>

    <!-- ══ LOBBY SCREEN ══ -->
    <div class="lobby-screen" id="lobbyScreen">

      <div class="code-box">
        <div class="code-label">Share this code with players</div>
        <div class="code" id="displayCode">——</div>
        <div class="code-hint">All players enter this code to join</div>
      </div>

      <div class="glass-card">
        <div class="section-label">Players</div>
        <div class="player-list" id="playerList"></div>

        <div class="waiting-label" id="waitingLabel">
          <span class="waiting-dot"></span>
          <span class="waiting-dot"></span>
          <span class="waiting-dot"></span>
          Waiting for players to join
        </div>

        <button class="btn btn-green" id="startTournamentBtn" style="display:none;">⚡ Start Tournament</button>
      </div>

    </div>

    <!-- ══ GAME SCREEN ══ -->
    <div class="game-screen" id="gameScreen">

      <div class="glass-card">
        <div class="section-label">Games</div>
        <div class="game-progress" id="gameProgress"></div>
      </div>

      <div class="glass-card" id="gameActionCard">
        <div id="waitingMessage" style="display:none;"></div>
        <div id="gameFrame"      style="display:none;"></div>
        <div id="scoreInputSection" style="display:none;"></div>
      </div>

    </div>

    <!-- ══ RESULTS SCREEN ══ -->
    <div class="results-screen" id="resultsScreen">

      <div class="scoreboard-header">
        <span class="trophy-big">🏆</span>
        <h2>Tournament Results</h2>
      </div>

      <div class="scoreboard" id="finalScoreboard"></div>

      <button class="btn btn-primary" id="resetTournamentBtn">↺ New Tournament</button>

    </div>

  </main>

</body>
</html>
