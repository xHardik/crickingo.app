<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cricket Tournament Hub</title>

<style>
    * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

@keyframes fadeIn {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
}

@keyframes slideUp {
    from { opacity: 0; transform: translateY(30px); }
    to { opacity: 1; transform: translateY(0); }
}

@keyframes pulse {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.05); }
}

body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
    background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
    min-height: 100vh;
    padding: 20px;
    position: relative;
    overflow-x: hidden;
}

body::before {
    content: '';
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background: 
        radial-gradient(circle at 20% 50%, rgba(120, 119, 198, 0.3) 0%, transparent 50%),
        radial-gradient(circle at 80% 80%, rgba(138, 43, 226, 0.2) 0%, transparent 50%);
    pointer-events: none;
}

.container {
    max-width: 1200px;
    margin: 0 auto;
    position: relative;
    z-index: 1;
}

.header {
    text-align: center;
    color: white;
    margin-bottom: 40px;
    animation: fadeIn 0.6s ease-out;
}

.header h1 {
    font-size: 3em;
    margin-bottom: 10px;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    font-weight: 800;
    letter-spacing: -1px;
}

.header p {
    font-size: 1.2em;
    opacity: 0.9;
    font-weight: 300;
}

.tabs {
    display: flex;
    gap: 12px;
    margin-bottom: 30px;
    flex-wrap: wrap;
    animation: fadeIn 0.6s ease-out 0.1s backwards;
}

.tab-btn {
    flex: 1;
    min-width: 150px;
    padding: 16px 24px;
    background: rgba(255, 255, 255, 0.1);
    backdrop-filter: blur(10px);
    border: 2px solid rgba(255, 255, 255, 0.2);
    color: white;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    border-radius: 12px;
    transition: all 0.3s ease;
}

.tab-btn:hover {
    background: rgba(255, 255, 255, 0.15);
    transform: translateY(-2px);
    border-color: rgba(102, 126, 234, 0.5);
}

.tab-btn.active {
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    color: white;
    border-color: transparent;
    box-shadow: 0 8px 25px rgba(102, 126, 234, 0.4);
}

.content {
    background: rgba(255, 255, 255, 0.1);
    backdrop-filter: blur(10px);
    border-radius: 20px;
    padding: 40px;
    box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
    border: 1px solid rgba(255, 255, 255, 0.18);
    animation: slideUp 0.6s ease-out 0.2s backwards;
}

.tab-content {
    display: none;
}

.tab-content.active {
    display: block;
    animation: fadeIn 0.4s ease-out;
}

.create-tournament-form {
    max-width: 700px;
    margin: 0 auto;
}

.form-group {
    margin-bottom: 25px;
}

.form-group label {
    display: block;
    margin-bottom: 10px;
    font-weight: 600;
    color: white;
    font-size: 1.05em;
}

.form-group input,
.form-group select,
.form-group textarea {
    width: 100%;
    padding: 15px 18px;
    border: 2px solid rgba(255, 255, 255, 0.2);
    border-radius: 12px;
    font-size: 15px;
    transition: all 0.3s ease;
    background: rgba(255, 255, 255, 0.1);
    color: white;
    backdrop-filter: blur(10px);
}

.form-group input::placeholder,
.form-group textarea::placeholder {
    color: rgba(255, 255, 255, 0.5);
}

.form-group input:focus,
.form-group select:focus,
.form-group textarea:focus {
    outline: none;
    border-color: #667eea;
    background: rgba(255, 255, 255, 0.15);
    box-shadow: 0 0 20px rgba(102, 126, 234, 0.3);
}

.game-selection {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 12px;
    margin-top: 15px;
}

.game-checkbox {
    display: flex;
    align-items: center;
    padding: 15px;
    border: 2px solid rgba(255, 255, 255, 0.2);
    border-radius: 12px;
    cursor: pointer;
    transition: all 0.3s ease;
    background: rgba(255, 255, 255, 0.05);
    backdrop-filter: blur(5px);
}

.game-checkbox:hover {
    border-color: #667eea;
    background: rgba(102, 126, 234, 0.2);
    transform: translateY(-2px);
}

.game-checkbox input {
    margin-right: 10px;
    width: 18px;
    height: 18px;
    cursor: pointer;
}

.game-checkbox span {
    color: white;
    font-weight: 500;
}

.game-checkbox.checked {
    border-color: #667eea;
    background: rgba(102, 126, 234, 0.3);
    box-shadow: 0 4px 15px rgba(102, 126, 234, 0.3);
}

.btn {
    padding: 16px 35px;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    color: white;
    border: none;
    border-radius: 12px;
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.3s ease;
    width: 100%;
    box-shadow: 0 8px 25px rgba(102, 126, 234, 0.4);
}

.btn:hover {
    transform: translateY(-3px);
    box-shadow: 0 12px 35px rgba(102, 126, 234, 0.6);
}

.btn:active {
    transform: translateY(-1px);
}

.btn:disabled {
    opacity: 0.5;
    cursor: not-allowed;
}

.btn-secondary {
    background: rgba(255, 255, 255, 0.1);
    border: 2px solid rgba(255, 255, 255, 0.3);
    backdrop-filter: blur(10px);
}

.btn-secondary:hover {
    background: rgba(255, 255, 255, 0.2);
    border-color: rgba(255, 255, 255, 0.5);
}

.btn-success {
    background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
}

.btn-danger {
    background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
}

.small-btn {
    padding: 12px 20px;
    font-size: 14px;
}

.tournament-card {
    border: 2px solid rgba(255, 255, 255, 0.2);
    border-radius: 16px;
    padding: 25px;
    margin-bottom: 25px;
    transition: all 0.3s ease;
    background: rgba(255, 255, 255, 0.05);
    backdrop-filter: blur(5px);
    animation: fadeIn 0.4s ease-out;
}

.tournament-card:hover {
    border-color: #667eea;
    box-shadow: 0 8px 30px rgba(102, 126, 234, 0.3);
    transform: translateY(-3px);
}

.tournament-header {
    display: flex;
    justify-content: space-between;
    align-items: start;
    margin-bottom: 20px;
    gap: 15px;
}

.tournament-title {
    font-size: 1.6em;
    color: white;
    font-weight: 700;
    line-height: 1.3;
}

.tournament-code {
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    color: white;
    padding: 10px 20px;
    border-radius: 25px;
    font-weight: 700;
    font-size: 1em;
    letter-spacing: 2px;
    box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
    white-space: nowrap;
}

.tournament-info {
    color: rgba(255, 255, 255, 0.8);
    margin-bottom: 15px;
    font-size: 0.95em;
}

.games-list {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    margin: 15px 0;
}

.game-badge {
    background: rgba(102, 126, 234, 0.3);
    color: white;
    padding: 8px 16px;
    border-radius: 20px;
    font-size: 0.9em;
    font-weight: 600;
    border: 1px solid rgba(102, 126, 234, 0.5);
}

.participants {
    margin-top: 20px;
}

.participants h4 {
    color: white;
    font-size: 1.2em;
    margin-bottom: 15px;
}

.participant-item {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 15px;
    background: rgba(255, 255, 255, 0.08);
    border-radius: 12px;
    margin-bottom: 10px;
    transition: all 0.3s ease;
}

.participant-item:hover {
    background: rgba(255, 255, 255, 0.12);
    transform: translateX(5px);
}

.participant-name {
    font-weight: 600;
    color: white;
}

.rank {
    font-size: 1.3em;
    font-weight: 700;
    color: #667eea;
    text-align: center;
    min-width: 50px;
}

.rank.gold { color: #FFD700; text-shadow: 0 0 10px rgba(255, 215, 0, 0.5); }
.rank.silver { color: #C0C0C0; text-shadow: 0 0 10px rgba(192, 192, 192, 0.5); }
.rank.bronze { color: #CD7F32; text-shadow: 0 0 10px rgba(205, 127, 50, 0.5); }

.total-score {
    text-align: right;
    font-size: 1.3em;
    font-weight: 700;
    color: #ffd700;
}

.join-tournament {
    max-width: 600px;
    margin: 0 auto;
    text-align: center;
}

.join-tournament h2 {
    color: white;
    margin-bottom: 15px;
}

.join-tournament p {
    color: rgba(255, 255, 255, 0.7);
}

.code-input-group {
    display: flex;
    gap: 12px;
    margin-top: 25px;
}

.code-input-group input {
    flex: 1;
    padding: 18px;
    border: 2px solid rgba(255, 255, 255, 0.2);
    border-radius: 12px;
    font-size: 18px;
    text-transform: uppercase;
    text-align: center;
    letter-spacing: 3px;
    font-weight: 700;
    background: rgba(255, 255, 255, 0.1);
    color: white;
    backdrop-filter: blur(10px);
}

.code-input-group input:focus {
    outline: none;
    border-color: #667eea;
    box-shadow: 0 0 20px rgba(102, 126, 234, 0.4);
}

.code-input-group input::placeholder {
    color: rgba(255, 255, 255, 0.4);
}

.empty-state {
    text-align: center;
    padding: 80px 20px;
    color: rgba(255, 255, 255, 0.6);
}

.empty-state h3 {
    font-size: 1.8em;
    margin-bottom: 15px;
    color: white;
}

.status-badge {
    display: inline-block;
    padding: 6px 16px;
    border-radius: 20px;
    font-size: 0.85em;
    font-weight: 600;
    margin-left: 12px;
}

.status-active {
    background: rgba(40, 167, 69, 0.3);
    color: #5fffb0;
    border: 1px solid #28a745;
}

.status-completed {
    background: rgba(0, 123, 255, 0.3);
    color: #4facfe;
    border: 1px solid #007bff;
}

.status-expired {
    background: rgba(220, 53, 69, 0.3);
    color: #ff6b9d;
    border: 1px solid #dc3545;
}

.action-buttons {
    display: flex;
    gap: 12px;
    margin-top: 20px;
    flex-wrap: wrap;
}

.live-badge {
    display: inline-block;
    background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
    color: white;
    padding: 6px 14px;
    border-radius: 20px;
    font-size: 0.85em;
    font-weight: 700;
    animation: pulse 2s infinite;
    margin-left: 10px;
}

.waiting-room {
    background: rgba(255, 255, 255, 0.08);
    padding: 30px;
    border-radius: 16px;
    margin: 20px 0;
    border: 2px solid rgba(102, 126, 234, 0.4);
}

.match-info {
    background: linear-gradient(135deg, rgba(102, 126, 234, 0.2) 0%, rgba(118, 75, 162, 0.2) 100%);
    padding: 20px;
    border-radius: 12px;
    margin: 20px 0;
    border: 2px solid rgba(102, 126, 234, 0.4);
}

.details-container {
    max-width: 900px;
    margin: 20px auto;
    background: rgba(255, 255, 255, 0.1);
    backdrop-filter: blur(20px);
    padding: 40px;
    border-radius: 20px;
    border: 1px solid rgba(255, 255, 255, 0.2);
    box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
}

.details-container h2,
.details-container h3 {
    color: white;
}

.overlay {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background: rgba(0, 0, 0, 0.95);
    z-index: 1000;
    overflow-y: auto;
    padding: 20px;
    animation: fadeIn 0.3s;
}

@media (max-width: 768px) {
    .header h1 {
        font-size: 2.2em;
    }

    .tabs {
        flex-direction: column;
    }

    .tab-btn {
        min-width: 100%;
    }

    .content {
        padding: 25px 20px;
    }

    .tournament-header {
        flex-direction: column;
        align-items: start;
    }

    .tournament-code {
        align-self: flex-start;
    }

    .action-buttons {
        flex-direction: column;
    }

    .action-buttons .btn {
        width: 100%;
    }

    .code-input-group {
        flex-direction: column;
    }

    .code-input-group .btn {
        width: 100%;
    }
}
</style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🏏 Cricket Tournament Hub</h1>
            <p>Compete with friends in real-time synchronized matches!</p>
        </div>

        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('create')">Create Tournament</button>
            <button class="tab-btn" onclick="switchTab('join')">Join Tournament</button>
            <button class="tab-btn" onclick="switchTab('my-tournaments')">My Tournaments</button>
            <button class="tab-btn" onclick="switchTab('active')">Active Tournaments</button>
        </div>

        <div class="content">
            <!-- Create Tournament Tab -->
            <div id="create" class="tab-content active">
                <div class="create-tournament-form">
                    <h2 style="margin-bottom: 30px; text-align: center; color: white; font-size: 2em;">Create New Tournament</h2>
                    
                    <div class="form-group">
                        <label>Your Name</label>
                        <input type="text" id="creatorName" placeholder="Enter your name" maxlength="30">
                    </div>

                    <div class="form-group">
                        <label>Tournament Name</label>
                        <input type="text" id="tournamentName" placeholder="e.g., Weekend Cricket Challenge" maxlength="50">
                    </div>

                    <div class="form-group">
                        <label>Tournament Duration</label>
                        <div style="padding: 15px 18px; border: 2px solid rgba(102, 126, 234, 0.5); border-radius: 12px; background: rgba(102, 126, 234, 0.2); color: white; font-weight: 600; text-align: center;">
                            ⏱️ 10 Minutes (Fixed)
                        </div>
                        <input type="hidden" id="tournamentDuration" value="0.006944">
                    </div>

                    <div class="form-group">
                        <label>Description (Optional)</label>
                        <textarea id="tournamentDesc" rows="3" placeholder="Add a description for your tournament..."></textarea>
                    </div>

                    <div class="form-group">
                        <label>Select Games</label>
                        <div class="game-selection">
                            <label class="game-checkbox">
                                <input type="checkbox" value="hl" checked>
                                <span>📈 Higher or Lower</span>
                            </label>
                            <label class="game-checkbox">
                                <input type="checkbox" value="transfer" checked>
                                <span>🔄 Transfer History</span>
                            </label>
                            <label class="game-checkbox">
                                <input type="checkbox" value="rivalry" checked>
                                <span>🎯 Cricket Bingo</span>
                            </label>
                            <label class="game-checkbox">
                                <input type="checkbox" value="wordle" checked>
                                <span>🔤 Cricket Wordle</span>
                            </label>
                            <label class="game-checkbox">
                                <input type="checkbox" value="builder" checked>
                                <span>👥 Build Your Team</span>
                            </label>
                        </div>
                    </div>

                    <button class="btn" onclick="TournamentManager.createTournament()">Create Tournament</button>
                </div>
            </div>

            <!-- Join Tournament Tab -->
            <div id="join" class="tab-content">
                <div class="join-tournament">
                    <h2 style="margin-bottom: 20px;">Join Tournament</h2>
                    <p style="margin-bottom: 30px;">Enter the tournament code to join</p>
                    
                    <div class="form-group">
                        <label>Your Name</label>
                        <input type="text" id="joinPlayerName" placeholder="Enter your name" maxlength="30">
                    </div>

                    <div class="code-input-group">
                        <input type="text" id="tournamentCode" placeholder="ENTER CODE" maxlength="6">
                        <button class="btn" style="width: auto; padding: 18px 40px;" onclick="TournamentManager.joinTournament()">Join</button>
                    </div>
                </div>
            </div>

            <!-- My Tournaments Tab -->
            <div id="my-tournaments" class="tab-content">
                <h2 style="margin-bottom: 25px; color: white; font-size: 1.8em;">My Tournaments</h2>
                <div id="myTournamentsContainer"></div>
            </div>

            <!-- Active Tournaments Tab -->
            <div id="active" class="tab-content">
                <h2 style="margin-bottom: 25px; color: white; font-size: 1.8em;">All Active Tournaments</h2>
                <div id="activeTournamentsContainer"></div>
            </div>
        </div>
    </div>

    <script src="tour-storage.js"></script>
    <script src="tour-ui.js"></script>
    <script src="tour-main.js"></script>
    <script src="tour-match.js"></script>
    <script src="tour-app.js"></script>
</body>
</html>
