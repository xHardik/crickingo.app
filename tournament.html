<!DOCTYPE html>
<html lang="en">
<head>
    <script tpe="module" src="tour-match.js" defer > </script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Game Tournament</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 20px;
    }
    
    .container {
      max-width: 900px;
      margin: 0 auto;
      background: white;
      border-radius: 20px;
      padding: 30px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    }
    
    h1 {
      text-align: center;
      color: #667eea;
      margin-bottom: 30px;
      font-size: 2.5em;
    }
    
    .setup-screen, .lobby-screen, .game-screen, .results-screen {
      display: none;
    }
    
    .setup-screen.active, .lobby-screen.active, .game-screen.active, .results-screen.active {
      display: block;
    }
    
    .form-group {
      margin-bottom: 20px;
    }
    
    label {
      display: block;
      margin-bottom: 8px;
      font-weight: 600;
      color: #333;
    }
    
    input, select {
      width: 100%;
      padding: 12px;
      border: 2px solid #e0e0e0;
      border-radius: 8px;
      font-size: 16px;
      transition: border-color 0.3s;
    }
    
    input:focus, select:focus {
      outline: none;
      border-color: #667eea;
    }
    
    button {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      padding: 14px 28px;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
      width: 100%;
      margin-top: 10px;
    }
    
    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
    }
    
    button:active {
      transform: translateY(0);
    }
    
    .player-list {
      background: #f8f9fa;
      border-radius: 12px;
      padding: 20px;
      margin: 20px 0;
    }
    
    .player-item {
      background: white;
      padding: 15px;
      margin: 10px 0;
      border-radius: 8px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
    
    .player-name {
      font-weight: 600;
      color: #333;
    }
    
    .player-status {
      color: #28a745;
      font-size: 14px;
    }
    
    .game-progress {
      margin: 30px 0;
    }
    
    .game-item {
      display: flex;
      align-items: center;
      margin: 15px 0;
      padding: 15px;
      background: #f8f9fa;
      border-radius: 8px;
    }
    
    .game-number {
      width: 40px;
      height: 40px;
      background: #667eea;
      color: white;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      margin-right: 15px;
    }
    
    .game-item.completed .game-number {
      background: #28a745;
    }
    
    .game-item.active .game-number {
      background: #ffc107;
      animation: pulse 1.5s infinite;
    }
    
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.1); }
    }
    
    .game-info {
      flex: 1;
    }
    
    .game-name {
      font-weight: 600;
      color: #333;
    }
    
    .game-status {
      font-size: 14px;
      color: #666;
      margin-top: 4px;
    }
    
    .scoreboard {
      margin: 30px 0;
    }
    
    .score-item {
      display: flex;
      justify-content: space-between;
      padding: 15px;
      margin: 10px 0;
      background: #f8f9fa;
      border-radius: 8px;
    }
    
    .score-item.winner {
      background: linear-gradient(135deg, #ffd700 0%, #ffed4e 100%);
      border: 3px solid #ffc107;
      font-weight: 700;
    }
    
    .rank {
      font-weight: 700;
      color: #667eea;
      margin-right: 15px;
    }
    
    .score {
      font-weight: 700;
      color: #28a745;
    }
    
    .tournament-code {
      background: #f8f9fa;
      padding: 20px;
      border-radius: 12px;
      text-align: center;
      margin: 20px 0;
      border: 2px dashed #667eea;
    }
    
    .code {
      font-size: 32px;
      font-weight: 700;
      color: #667eea;
      letter-spacing: 4px;
      margin: 10px 0;
    }
    
    iframe {
      width: 100%;
      height: 600px;
      border: none;
      border-radius: 12px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    }
    
    .info-text {
      text-align: center;
      color: #666;
      margin: 20px 0;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🏆 Game Tournament</h1>
    
    <!-- Setup Screen -->
    <div class="setup-screen active" id="setupScreen">
      <div class="form-group">
        <label>Tournament Name:</label>
        <input type="text" id="tournamentName" placeholder="Enter tournament name" value="Epic Tournament">
      </div>
      
      <div class="form-group">
        <label>Number of Players:</label>
        <select id="playerCount">
          <option value="2">2 Players</option>
          <option value="3">3 Players</option>
          <option value="4">4 Players</option>
        </select>
      </div>
      
      <div class="form-group">
        <label>Your Name:</label>
        <input type="text" id="hostName" placeholder="Enter your name">
      </div>
      
      <button id="createTournamentBtn">Create Tournament</button>
      
      <div style="text-align: center; margin: 30px 0; color: #666;">OR</div>
      
      <div class="form-group">
        <label>Join Existing Tournament:</label>
        <input type="text" id="joinCode" placeholder="Enter tournament code">
      </div>
      
      <div class="form-group">
        <label>Your Name:</label>
        <input type="text" id="joinName" placeholder="Enter your name">
      </div>
      
      <button id="joinTournamentBtn">Join Tournament</button>
    </div>
    
    <!-- Lobby Screen -->
    <div class="lobby-screen" id="lobbyScreen">
      <div class="tournament-code">
        <div>Share this code with players:</div>
        <div class="code" id="displayCode"></div>
      </div>
      
      <div class="player-list" id="playerList"></div>
      
      <div class="info-text">Waiting for all players to join...</div>
      
      <button id="startTournamentBtn" style="display: none;">Start Tournament</button>
    </div>
    
    <!-- Game Screen -->
    <div class="game-screen" id="gameScreen">
      <div class="game-progress" id="gameProgress"></div>
      
      <div style="margin: 30px 0;">
        <h2 style="text-align: center; color: #667eea; margin-bottom: 20px;">Current Game</h2>
        <iframe id="gameFrame" src=""></iframe>
      </div>
      
      <div class="form-group">
        <label>Your Score for This Game:</label>
        <input type="number" id="scoreInput" placeholder="Enter your score" min="0">
      </div>
      
      <button id="submitScoreBtn">Submit Score & Continue</button>
    </div>
    
    <!-- Results Screen -->
    <div class="results-screen" id="resultsScreen">
      <h2 style="text-align: center; color: #667eea; margin: 30px 0;">🏆 Tournament Results 🏆</h2>
      
      <div class="scoreboard" id="finalScoreboard"></div>
      
      <button id="resetTournamentBtn">Create New Tournament</button>
    </div>
  </div>
</body>
</html>
