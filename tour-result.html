<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tournament Results — Crickingo</title>
  <link rel="icon" type="image/png" href="logo.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:      #060810;
      --surface: rgba(255,255,255,0.04);
      --border:  rgba(255,255,255,0.08);
      --accent:  #F7C344;
      --accent2: #E84040;
      --accent3: #4F8EF7;
      --green:   #3DD68C;
      --silver:  #C0C8D8;
      --bronze:  #CD9B6A;
      --text:    #F2F2F2;
      --muted:   rgba(242,242,242,0.45);
      --radius:  16px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ── BACKGROUND ── */
    .bg-layer {
      position: fixed; inset: 0; z-index: 0; pointer-events: none;
      background:
        radial-gradient(ellipse 80% 55% at 50%  0%,  rgba(247,195,68,0.14) 0%, transparent 60%),
        radial-gradient(ellipse 50% 40% at 10% 80%,  rgba(79,142,247,0.07) 0%, transparent 60%),
        radial-gradient(ellipse 50% 40% at 90% 60%,  rgba(232,64,64,0.06)  0%, transparent 60%);
    }
    .bg-layer::after {
      content: '';
      position: absolute; inset: 0;
      background-image: repeating-linear-gradient(
        -45deg, transparent, transparent 40px,
        rgba(255,255,255,0.010) 40px, rgba(255,255,255,0.010) 41px
      );
    }

    /* ── CONFETTI CANVAS ── */
    #confettiCanvas {
      position: fixed; inset: 0; z-index: 999;
      pointer-events: none;
    }

    /* ── NAV ── */
    nav {
      position: sticky; top: 0; z-index: 100;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 24px; height: 64px;
      background: rgba(6,8,16,0.88);
      backdrop-filter: blur(24px);
      border-bottom: 1px solid var(--border);
      box-shadow: 0 0 40px rgba(247,195,68,0.10), 0 0 80px rgba(247,195,68,0.05);
    }

    .nav-logo {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.8rem; letter-spacing: 2px;
      background: linear-gradient(90deg, var(--accent), #fff 60%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
      text-decoration: none;
    }

    .nav-tag {
      font-size: 0.72rem; font-weight: 700;
      text-transform: uppercase; letter-spacing: 2px;
      color: var(--accent);
      background: rgba(247,195,68,0.1);
      border: 1px solid rgba(247,195,68,0.25);
      padding: 4px 14px; border-radius: 100px;
    }

    .nav-home {
      color: var(--muted); text-decoration: none;
      font-size: 0.88rem; font-weight: 500;
      transition: color 0.2s, transform 0.2s;
    }
    .nav-home:hover { color: var(--text); transform: translateX(-3px); }

    /* ── PAGE ── */
    .page {
      position: relative; z-index: 3;
      max-width: 860px; margin: 0 auto;
      padding: 48px 20px 100px;
    }

    /* ── HERO ── */
    .hero {
      text-align: center;
      margin-bottom: 48px;
      animation: fadeUp 0.6s ease both;
    }

    .hero-trophy {
      font-size: 4.5rem;
      display: block; margin-bottom: 12px;
      animation: floatBounce 2.8s ease-in-out infinite;
      filter: drop-shadow(0 0 40px rgba(247,195,68,0.55));
    }

    @keyframes floatBounce {
      0%,100% { transform: translateY(0) rotate(-4deg) scale(1); }
      50%      { transform: translateY(-16px) rotate(4deg) scale(1.05); }
    }

    .hero-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(2.4rem, 8vw, 5rem);
      letter-spacing: 4px; line-height: 1;
      background: linear-gradient(135deg, var(--accent) 0%, #fff 45%, var(--accent) 100%);
      background-size: 200% auto;
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
      animation: shimmer 3s linear infinite;
      margin-bottom: 10px;
    }

    @keyframes shimmer {
      to { background-position: 200% center; }
    }

    .hero-sub {
      color: var(--muted); font-size: 0.85rem; letter-spacing: 0.5px;
      margin-bottom: 14px;
    }

    .hero-tournament-name {
      display: inline-block;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.1rem; letter-spacing: 3px;
      color: var(--accent);
      background: rgba(247,195,68,0.08);
      border: 1px solid rgba(247,195,68,0.22);
      padding: 6px 22px; border-radius: 100px;
    }

    /* ── PODIUM ── */
    .podium-section { margin-bottom: 52px; }

    .section-label {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.05rem; letter-spacing: 3px;
      color: var(--accent); margin-bottom: 24px;
      display: flex; align-items: center; gap: 10px;
      text-align: center; justify-content: center;
    }

    #podium {
      display: flex;
      justify-content: center;
      align-items: flex-end;
      gap: 10px;
      padding: 0 4px;
    }

    .podium-place {
      flex: 0 0 auto;
      width: calc(33.333% - 8px);
      max-width: 200px;
      display: flex; flex-direction: column;
      align-items: center;
      min-width: 0;
    }

    .podium-place.second { order: 1; }
    .podium-place.first  { order: 2; }
    .podium-place.third  { order: 3; }

    /* Card above block */
    .podium-player {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px 10px 12px;
      text-align: center;
      margin-bottom: 8px;
      position: relative; overflow: hidden;
    }

    .podium-player::before {
      content: ''; position: absolute;
      top: 0; left: 0; right: 0; height: 3px;
    }

    .podium-place.first  .podium-player {
      border-color: rgba(247,195,68,0.45);
      box-shadow: 0 0 40px rgba(247,195,68,0.18);
      animation: riseIn 0.65s cubic-bezier(0.4,0,0.2,1) 0.1s both;
    }
    .podium-place.first  .podium-player::before { background: var(--accent); }

    .podium-place.second .podium-player {
      border-color: rgba(192,200,216,0.3);
      animation: riseIn 0.65s cubic-bezier(0.4,0,0.2,1) 0.3s both;
    }
    .podium-place.second .podium-player::before { background: var(--silver); }

    .podium-place.third  .podium-player {
      border-color: rgba(205,155,106,0.3);
      animation: riseIn 0.65s cubic-bezier(0.4,0,0.2,1) 0.5s both;
    }
    .podium-place.third  .podium-player::before { background: var(--bronze); }

    @keyframes riseIn {
      from { opacity: 0; transform: translateY(28px) scale(0.93); }
      to   { opacity: 1; transform: translateY(0)    scale(1); }
    }

    .podium-medal { font-size: 2rem; display: block; margin-bottom: 6px; }

    .podium-player-name {
      font-weight: 700; font-size: 0.82rem; color: var(--text);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      margin-bottom: 6px;
    }

    .podium-score {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(1.6rem, 4vw, 2.4rem);
      letter-spacing: 2px; line-height: 1;
    }

    .podium-place.first  .podium-score { color: var(--accent); }
    .podium-place.second .podium-score { color: var(--silver); }
    .podium-place.third  .podium-score { color: var(--bronze); }

    .podium-pts {
      font-size: 0.6rem; font-weight: 700;
      text-transform: uppercase; letter-spacing: 1.5px;
      color: var(--muted); margin-top: 3px;
    }

    /* Physical step blocks */
    .podium-block {
      width: 100%; border-radius: 10px 10px 0 0;
      display: flex; align-items: center; justify-content: center;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.1rem; letter-spacing: 2px;
    }

    .podium-place.first  .podium-block { height: 90px;  background: linear-gradient(180deg, rgba(247,195,68,0.22), rgba(247,195,68,0.06)); border: 1px solid rgba(247,195,68,0.3); border-bottom: none; color: var(--accent); }
    .podium-place.second .podium-block { height: 62px;  background: linear-gradient(180deg, rgba(192,200,216,0.15), rgba(192,200,216,0.04)); border: 1px solid rgba(192,200,216,0.2); border-bottom: none; color: var(--silver); }
    .podium-place.third  .podium-block { height: 40px;  background: linear-gradient(180deg, rgba(205,155,106,0.15), rgba(205,155,106,0.04)); border: 1px solid rgba(205,155,106,0.2); border-bottom: none; color: var(--bronze); }

    /* ── LEADERBOARD ── */
    .leaderboard-wrap {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 24px 20px;
      margin-bottom: 36px;
      position: relative; overflow: hidden;
    }

    .leaderboard-wrap::before {
      content: '';
      position: absolute; top: 0; left: 0; right: 0; height: 3px;
      background: linear-gradient(90deg, var(--accent), var(--accent2), var(--accent3));
      border-radius: 20px 20px 0 0;
    }

    .leaderboard-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.05rem; letter-spacing: 3px;
      color: var(--accent); margin-bottom: 18px;
      display: flex; align-items: center; gap: 10px;
    }
    .leaderboard-title::after { content: ''; flex: 1; height: 1px; background: var(--border); }

    /* ── PLAYER ROW ── */
    .player-row {
      display: flex; align-items: center; gap: 10px;
      padding: 12px 14px;
      background: rgba(255,255,255,0.025);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      margin-bottom: 10px;
      cursor: pointer;
      transition: border-color 0.2s, transform 0.2s, background 0.2s;
      animation: fadeUp 0.5s ease both;
      position: relative;
    }

    .player-row:nth-child(1) { animation-delay: 0.05s; }
    .player-row:nth-child(2) { animation-delay: 0.10s; }
    .player-row:nth-child(3) { animation-delay: 0.15s; }
    .player-row:nth-child(4) { animation-delay: 0.20s; }

    .player-row:hover {
      transform: translateX(4px);
      border-color: rgba(247,195,68,0.25);
      background: rgba(247,195,68,0.04);
    }

    .player-row.top-3 { border-color: rgba(247,195,68,0.2); }

    .rank {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.4rem; letter-spacing: 1px;
      min-width: 28px; text-align: center;
      color: var(--muted); flex-shrink: 0;
    }
    .player-row.top-3 .rank { color: var(--accent); }

    .player-info {
      display: flex; align-items: center; gap: 10px;
      flex: 1; min-width: 0;
    }

    .player-avatar {
      width: 34px; height: 34px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 0.9rem; letter-spacing: 1px;
      flex-shrink: 0;
      background: rgba(247,195,68,0.1);
      border: 1px solid rgba(247,195,68,0.2);
      color: var(--accent);
    }

    .name {
      font-weight: 700; font-size: 0.88rem; color: var(--text);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }

    .total-score {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.45rem; letter-spacing: 1px;
      color: var(--green); flex-shrink: 0;
    }
    .player-row.top-3 .total-score { color: var(--accent); }

    .breakdown-btn {
      font-size: 0.62rem; font-weight: 700;
      text-transform: uppercase; letter-spacing: 1px;
      padding: 5px 11px; border-radius: 8px;
      border: 1px solid var(--border);
      background: rgba(255,255,255,0.05);
      color: var(--muted);
      cursor: pointer;
      font-family: 'DM Sans', sans-serif;
      transition: all 0.2s;
      flex-shrink: 0;
      white-space: nowrap;
    }
    .breakdown-btn:hover, .breakdown-btn.open {
      border-color: rgba(247,195,68,0.4);
      color: var(--accent);
      background: rgba(247,195,68,0.08);
    }

    /* ── BREAKDOWN PANEL ── */
    .breakdown-wrap {
      overflow: hidden;
      max-height: 0;
      transition: max-height 0.35s cubic-bezier(0.4,0,0.2,1), opacity 0.25s ease;
      opacity: 0;
    }
    .breakdown-wrap.show {
      max-height: 600px;
      opacity: 1;
    }

    .breakdown {
      margin-top: 10px;
      padding: 16px;
      background: rgba(0,0,0,0.35);
      border: 1px solid rgba(247,195,68,0.15);
      border-radius: 12px;
      margin-bottom: 4px;
    }

    .breakdown-header {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 0.82rem; letter-spacing: 2.5px;
      color: var(--accent);
      margin-bottom: 12px;
      padding-bottom: 8px;
      border-bottom: 1px solid rgba(247,195,68,0.15);
    }

    .breakdown-item {
      display: flex; justify-content: space-between; align-items: center;
      padding: 9px 0;
      border-bottom: 1px solid rgba(255,255,255,0.05);
      font-size: 0.83rem;
      gap: 8px;
    }
    .breakdown-item:last-child { border-bottom: none; padding-bottom: 0; }

    .game-name {
      color: var(--muted); font-weight: 500;
      min-width: 0; flex: 1;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }

    .game-score {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.1rem; letter-spacing: 1px;
      flex-shrink: 0;
    }

    .game-score.positive { color: var(--green); }
    .game-score.zero     { color: var(--muted); }

    .breakdown-total {
      display: flex; justify-content: space-between; align-items: center;
      margin-top: 10px;
      padding: 10px 14px;
      background: rgba(247,195,68,0.07);
      border: 1px solid rgba(247,195,68,0.2);
      border-radius: 8px;
      font-size: 0.85rem; font-weight: 700;
      color: var(--text);
    }
    .breakdown-total-score {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.4rem; letter-spacing: 1px;
      color: var(--accent);
    }

    /* ── ACTIONS ── */
    .actions {
      display: flex; gap: 14px; justify-content: center; flex-wrap: wrap;
    }

    .btn {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 14px 28px; border: none; border-radius: 12px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.88rem; font-weight: 800;
      cursor: pointer; transition: all 0.25s ease;
      text-transform: uppercase; letter-spacing: 0.5px;
      text-decoration: none;
      position: relative; overflow: hidden;
    }
    .btn::after {
      content: '';
      position: absolute; inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.15), transparent);
      opacity: 0; transition: opacity 0.25s;
    }
    .btn:hover::after { opacity: 1; }

    .btn-primary {
      background: var(--accent); color: #000;
      box-shadow: 0 6px 24px rgba(247,195,68,0.25);
    }
    .btn-primary:hover { background: #ffd060; transform: translateY(-2px); box-shadow: 0 10px 32px rgba(247,195,68,0.35); }

    .btn-secondary {
      background: var(--surface); color: var(--text);
      border: 1px solid var(--border);
    }
    .btn-secondary:hover { border-color: rgba(247,195,68,0.35); transform: translateY(-2px); }

    /* ── ANIMATIONS ── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(18px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── MOBILE ── */
    @media (max-width: 480px) {
      nav { padding: 0 14px; }
      .nav-logo { font-size: 1.5rem; }
      .nav-tag  { font-size: 0.65rem; padding: 4px 10px; letter-spacing: 1px; }

      .page { padding: 24px 12px 80px; }

      .hero-trophy { font-size: 3.2rem; }
      .hero-title  { font-size: clamp(1.8rem, 7vw, 2.8rem); letter-spacing: 2px; }

      /* Podium: fixed thirds, no overflow */
      #podium { gap: 6px; padding: 0; width: 100%; }

      .podium-place {
        width: calc(33.333% - 4px);
        max-width: none;
      }

      .podium-medal { font-size: 1.4rem; margin-bottom: 4px; }

      .podium-player { padding: 10px 4px 8px; border-radius: 10px; }

      .podium-player-name {
        font-size: 0.68rem;
        white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        max-width: 100%;
      }

      .podium-score { font-size: clamp(1.1rem, 4vw, 1.4rem); letter-spacing: 1px; }

      .podium-pts { font-size: 0.5rem; }

      .podium-block { font-size: 0.85rem; }
      .podium-place.first  .podium-block { height: 64px; }
      .podium-place.second .podium-block { height: 44px; }
      .podium-place.third  .podium-block { height: 28px; }

      /* Leaderboard */
      .leaderboard-wrap { padding: 16px 12px; border-radius: 14px; }
      .player-row { padding: 10px 10px; gap: 8px; }
      .rank { font-size: 1.2rem; min-width: 22px; }
      .player-avatar { width: 30px; height: 30px; font-size: 0.78rem; }
      .name { font-size: 0.82rem; }
      .total-score { font-size: 1.25rem; }
      .breakdown-btn { font-size: 0.58rem; padding: 4px 9px; letter-spacing: 0.5px; }
      .breakdown { padding: 12px; }
      .breakdown-item { font-size: 0.78rem; padding: 8px 0; }
      .game-score { font-size: 0.95rem; }

      /* Actions stack on mobile */
      .actions { flex-direction: column; padding: 0 8px; }
      .actions .btn { width: 100%; justify-content: center; }
    }

    /* Very small screens: hide avatar to save space */
    @media (max-width: 360px) {
      .player-avatar { display: none; }
      .podium-score  { font-size: 1rem; }
    }
  </style>
</head>
<body>

  <canvas id="confettiCanvas"></canvas>
  <div class="bg-layer"></div>

  <!-- ── NAV ── -->
  <nav>
    <a href="index.html" class="nav-logo">🏏 Crickingo</a>
    <span class="nav-tag">🏆 Results</span>
  </nav>

  <!-- ── PAGE ── -->
  <main class="page">

    <!-- HERO -->
    <div class="hero">
      <span class="hero-trophy">🏆</span>
      <h1 class="hero-title">Tournament Complete!</h1>
      <p class="hero-sub">All games played · Final scores locked in</p>
      <div class="hero-tournament-name" id="tournamentName">Loading…</div>
    </div>

    <!-- PODIUM -->
    <div class="podium-section">
      <div id="podium"></div>
    </div>

    <!-- LEADERBOARD -->
    <div class="leaderboard-wrap">
      <div class="leaderboard-title">📊 Full Leaderboard</div>
      <div id="leaderboard"></div>
    </div>

    <!-- ACTIONS -->
    <div class="actions">
      <button class="btn btn-primary" onclick="window.location.href='index.html'">
        🏠 Home
      </button>
      <button class="btn btn-secondary" onclick="window.location.href='tournament.html'">
        🔄 New Tournament
      </button>
    </div>

  </main>

  <!-- ── CONFETTI ── -->
  <script>
    (function() {
      const canvas  = document.getElementById('confettiCanvas');
      const ctx     = canvas.getContext('2d');
      const COLOURS = ['#F7C344','#E84040','#4F8EF7','#3DD68C','#c084fc','#ffffff'];
      let   pieces  = [];
      let   running = true;

      function resize() {
        canvas.width  = window.innerWidth;
        canvas.height = window.innerHeight;
      }
      window.addEventListener('resize', resize);
      resize();

      function spawn(count) {
        for (let i = 0; i < count; i++) {
          pieces.push({
            x:    Math.random() * canvas.width,
            y:    Math.random() * -80 - 10,
            w:    Math.random() * 12 + 6,
            h:    Math.random() * 7  + 3,
            rot:  Math.random() * Math.PI * 2,
            vx:   (Math.random() - 0.5) * 3,
            vy:   Math.random() * 4 + 2,
            vr:   (Math.random() - 0.5) * 0.16,
            col:  COLOURS[Math.floor(Math.random() * COLOURS.length)],
            life: 1,
            decay: Math.random() * 0.006 + 0.004
          });
        }
      }

      spawn(160);
      setTimeout(() => spawn(120), 800);
      setTimeout(() => spawn(100), 1600);
      setTimeout(() => { running = false; }, 6000);

      function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        pieces = pieces.filter(p => p.life > 0.02);
        pieces.forEach(p => {
          p.x   += p.vx;
          p.y   += p.vy;
          p.rot += p.vr;
          if (p.y > canvas.height * 0.65) p.life -= p.decay * 2;
          else if (!running) p.life -= p.decay * 0.5;

          ctx.save();
          ctx.globalAlpha = Math.max(0, p.life);
          ctx.translate(p.x, p.y);
          ctx.rotate(p.rot);
          ctx.fillStyle = p.col;
          ctx.fillRect(-p.w / 2, -p.h / 2, p.w, p.h);
          ctx.restore();
        });
        if (pieces.length > 0) requestAnimationFrame(draw);
      }
      draw();
    })();
  </script>

  <!-- ── INLINE RESULT LOGIC ── -->
  <!-- This replaces tour-result.js's rendering so the breakdown toggle works properly.
       tour-result.js still loads for data fetching — we override the render functions. -->
  <script>
    // Smooth breakdown toggle — called by the rendered buttons
    window.toggleBreakdown = function(btn, rowEl) {
      const wrap = rowEl.querySelector('.breakdown-wrap');
      if (!wrap) return;
      const isOpen = wrap.classList.contains('show');

      // Close all others
      document.querySelectorAll('.breakdown-wrap.show').forEach(w => {
        w.classList.remove('show');
        const b = w.closest('.player-row')?.querySelector('.breakdown-btn');
        if (b) { b.classList.remove('open'); b.textContent = 'Details'; }
      });

      if (!isOpen) {
        wrap.classList.add('show');
        btn.classList.add('open');
        btn.textContent = 'Hide';
      }
    };
  </script>

  <script type="module" src="tour-result.js"></script>
</body>
</html>
