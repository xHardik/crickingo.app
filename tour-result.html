<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tournament Results — Crickingo</title>
  
  <meta property="og:title" content="Tournament Mode" />
<meta property="og:description" content="Can you beat your friends in a series of all games of crickingo?" />
<meta property="og:image" content="https://crickingo.vercel.app/logo.png" />
<meta property="og:url" content="https://crickingo.vercel.app/tour-result.html" />
<meta property="og:type" content="website" />
<meta name="twitter:card" content="summary_large_image" />
<meta name="twitter:title" content="Tournament Mode" />
<meta name="twitter:description" content="Can you beat your friends in a series of all games of crickingo?" />
<meta name="twitter:image" content="https://crickingo.vercel.app/logo.png" />
  <link rel="icon" type="image/png" href="logo.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,500;0,9..40,700;0,9..40,900&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #05070f;
      --surface: rgba(255,255,255,0.038);
      --surface2: rgba(255,255,255,0.065);
      --border: rgba(255,255,255,0.08);
      --border2: rgba(255,255,255,0.14);
      --accent: #F7C344;
      --accent2: #E84040;
      --accent3: #4F8EF7;
      --green: #3DD68C;
      --silver: #C4CCDA;
      --bronze: #D4A070;
      --text: #F0F0F0;
      --muted: rgba(240,240,240,0.45);
      --muted2: rgba(240,240,240,0.22);
      --radius: 16px;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; overflow-x: hidden; }

    /* BG */
    .bg-layer { position: fixed; inset: 0; z-index: 0; pointer-events: none; }
    .bg-layer::before { content: ''; position: absolute; inset: 0;
      background:
        radial-gradient(ellipse 90% 55% at 50% -5%, rgba(247,195,68,0.15) 0%, transparent 55%),
        radial-gradient(ellipse 55% 45% at 8% 80%, rgba(79,142,247,0.07) 0%, transparent 60%),
        radial-gradient(ellipse 55% 45% at 92% 65%, rgba(232,64,64,0.07) 0%, transparent 60%); }
    .bg-layer::after { content: ''; position: absolute; inset: 0;
      background-image: repeating-linear-gradient(-45deg, transparent, transparent 52px, rgba(255,255,255,0.007) 52px, rgba(255,255,255,0.007) 53px); }
    .noise { position: fixed; inset: 0; z-index: 0; pointer-events: none; opacity: 0.02;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      background-size: 200px 200px; }
    #confettiCanvas { position: fixed; inset: 0; z-index: 999; pointer-events: none; }

    /* NAV */
    nav { position: sticky; top: 0; z-index: 200;
      display: grid; grid-template-columns: 1fr auto 1fr;
      align-items: center; padding: 0 32px; height: 62px;
      background: rgba(5,7,15,0.85); backdrop-filter: blur(28px) saturate(1.5);
      border-bottom: 1px solid rgba(247,195,68,0.1); }
    .nav-logo { font-family: 'Bebas Neue', sans-serif; font-size: 1.75rem; letter-spacing: 3px; white-space: nowrap;
      background: linear-gradient(100deg, var(--accent) 0%, #ffe9a0 50%, var(--accent) 100%);
      background-size: 200% auto; -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
      text-decoration: none; animation: logoShimmer 4s linear infinite; }
    @keyframes logoShimmer { from{background-position:0% center} to{background-position:200% center} }
    .nav-center-tag { display: flex; align-items: center; gap: 7px; font-size: 0.7rem; font-weight: 800;
      text-transform: uppercase; letter-spacing: 2px; color: var(--accent);
      background: rgba(247,195,68,0.09); border: 1px solid rgba(247,195,68,0.26);
      padding: 5px 14px; border-radius: 100px; }
    .nav-center-tag .tag-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--accent); animation: blink 1.6s ease infinite; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.25} }
    .nav-right { display: flex; justify-content: flex-end; }
    .nav-home { color: var(--muted); text-decoration: none; font-size: 0.8rem; font-weight: 700;
      padding: 7px 16px; border-radius: 100px; border: 1px solid var(--border2);
      background: var(--surface); transition: all 0.2s; white-space: nowrap;
      text-transform: uppercase; letter-spacing: 0.5px; }
    .nav-home:hover { color: var(--text); border-color: rgba(247,195,68,0.35); background: rgba(247,195,68,0.07); }

    /* PAGE */
    .page { position: relative; z-index: 3; max-width: 860px; margin: 0 auto; padding: 48px 20px 100px; }

    /* HERO */
    .hero { text-align: center; margin-bottom: 56px; animation: fadeUp 0.6s ease both; }
    .hero-trophy { font-size: 5rem; display: block; margin-bottom: 16px;
      animation: floatBounce 2.8s ease-in-out infinite;
      filter: drop-shadow(0 0 48px rgba(247,195,68,0.65)) drop-shadow(0 0 96px rgba(247,195,68,0.3)); }
    @keyframes floatBounce { 0%,100%{transform:translateY(0) rotate(-3deg) scale(1)} 50%{transform:translateY(-18px) rotate(3deg) scale(1.06)} }
    .hero-title { font-family: 'Bebas Neue', sans-serif; font-size: clamp(2.8rem, 8vw, 5.5rem);
      letter-spacing: 5px; line-height: 1;
      background: linear-gradient(135deg, var(--accent) 0%, #fff 42%, var(--accent) 100%);
      background-size: 200% auto; -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text; animation: shimmer 3s linear infinite; margin-bottom: 12px; }
    @keyframes shimmer { to{background-position:200% center} }
    .hero-sub { color: var(--muted); font-size: 0.85rem; letter-spacing: 0.5px; margin-bottom: 16px; }
    .hero-tournament-name { display: inline-block; font-family: 'Bebas Neue', sans-serif;
      font-size: 1rem; letter-spacing: 3px; color: var(--accent);
      background: rgba(247,195,68,0.07); border: 1px solid rgba(247,195,68,0.22);
      padding: 6px 22px; border-radius: 100px; }

    /* PODIUM */
    .podium-section { margin-bottom: 52px; }
    .section-label { font-family: 'Bebas Neue', sans-serif; font-size: 0.9rem; letter-spacing: 3.5px;
      color: var(--muted); margin-bottom: 26px; display: flex; align-items: center; gap: 12px; justify-content: center; text-transform: uppercase; }

    #podium { display: flex; justify-content: center; align-items: flex-end; gap: 10px; padding: 0 4px; }

    .podium-place { flex: 0 0 auto; width: calc(33.333% - 8px); max-width: 210px;
      display: flex; flex-direction: column; align-items: center; min-width: 0; }
    .podium-place.second { order: 1; }
    .podium-place.first  { order: 2; }
    .podium-place.third  { order: 3; }

    .podium-player { width: 100%; border-radius: var(--radius); padding: 16px 10px 13px;
      text-align: center; margin-bottom: 8px; position: relative; overflow: hidden; }
    .podium-player::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px; }

    .podium-place.first .podium-player {
      background: rgba(247,195,68,0.07); border: 1px solid rgba(247,195,68,0.4);
      box-shadow: 0 0 48px rgba(247,195,68,0.15), 0 8px 32px rgba(247,195,68,0.08);
      animation: riseIn 0.7s cubic-bezier(0.4,0,0.2,1) 0.05s both; }
    .podium-place.first .podium-player::before { background: linear-gradient(90deg, transparent, var(--accent), transparent); }

    .podium-place.second .podium-player {
      background: rgba(196,204,218,0.05); border: 1px solid rgba(196,204,218,0.25);
      animation: riseIn 0.7s cubic-bezier(0.4,0,0.2,1) 0.25s both; }
    .podium-place.second .podium-player::before { background: linear-gradient(90deg, transparent, var(--silver), transparent); }

    .podium-place.third .podium-player {
      background: rgba(212,160,112,0.05); border: 1px solid rgba(212,160,112,0.25);
      animation: riseIn 0.7s cubic-bezier(0.4,0,0.2,1) 0.45s both; }
    .podium-place.third .podium-player::before { background: linear-gradient(90deg, transparent, var(--bronze), transparent); }

    @keyframes riseIn { from{opacity:0;transform:translateY(32px) scale(0.92)} to{opacity:1;transform:translateY(0) scale(1)} }

    .podium-medal { font-size: 2.2rem; display: block; margin-bottom: 7px; }
    .podium-player-name { font-weight: 700; font-size: 0.8rem; color: var(--text);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 8px; }
    .podium-score { font-family: 'Bebas Neue', sans-serif; font-size: clamp(1.7rem, 4.5vw, 2.6rem);
      letter-spacing: 2px; line-height: 1; }
    .podium-place.first .podium-score { color: var(--accent); }
    .podium-place.second .podium-score { color: var(--silver); }
    .podium-place.third .podium-score { color: var(--bronze); }
    .podium-pts { font-size: 0.58rem; font-weight: 800; text-transform: uppercase;
      letter-spacing: 2px; color: var(--muted2); margin-top: 5px; }

    .podium-block { width: 100%; border-radius: 10px 10px 0 0;
      display: flex; align-items: center; justify-content: center;
      font-family: 'Bebas Neue', sans-serif; font-size: 1.1rem; letter-spacing: 2px; }
    .podium-place.first .podium-block  { height: 96px;  background: linear-gradient(180deg, rgba(247,195,68,0.2), rgba(247,195,68,0.04)); border: 1px solid rgba(247,195,68,0.28); border-bottom: none; color: var(--accent); }
    .podium-place.second .podium-block { height: 66px;  background: linear-gradient(180deg, rgba(196,204,218,0.12), rgba(196,204,218,0.02)); border: 1px solid rgba(196,204,218,0.18); border-bottom: none; color: var(--silver); }
    .podium-place.third .podium-block  { height: 42px;  background: linear-gradient(180deg, rgba(212,160,112,0.12), rgba(212,160,112,0.02)); border: 1px solid rgba(212,160,112,0.18); border-bottom: none; color: var(--bronze); }

    /* LEADERBOARD */
    .leaderboard-wrap { background: var(--surface); border: 1px solid var(--border); border-radius: 22px;
      padding: 26px 22px; margin-bottom: 36px; position: relative; overflow: hidden; }
    .leaderboard-wrap::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px;
      background: linear-gradient(90deg, var(--accent), var(--accent2), var(--accent3)); border-radius: 22px 22px 0 0; }
    .leaderboard-title { font-family: 'Bebas Neue', sans-serif; font-size: 0.95rem; letter-spacing: 3px;
      color: var(--accent); margin-bottom: 18px; display: flex; align-items: center; gap: 10px; }
    .leaderboard-title::after { content: ''; flex: 1; height: 1px; background: var(--border2); }

    /* PLAYER ROW */
    .player-row { display: flex; align-items: center; gap: 10px; padding: 13px 14px;
      background: rgba(255,255,255,0.022); border: 1px solid var(--border);
      border-radius: var(--radius); margin-bottom: 10px; cursor: pointer;
      transition: border-color 0.2s, transform 0.2s, background 0.2s;
      animation: fadeUp 0.5s ease both; position: relative; }
    .player-row:nth-child(1){animation-delay:0.04s} .player-row:nth-child(2){animation-delay:0.08s}
    .player-row:nth-child(3){animation-delay:0.12s} .player-row:nth-child(4){animation-delay:0.16s}
    .player-row:hover { transform: translateX(4px); border-color: rgba(247,195,68,0.28); background: rgba(247,195,68,0.04); }
    .player-row.top-3 { border-color: rgba(247,195,68,0.2); }

    .rank { font-family: 'Bebas Neue', sans-serif; font-size: 1.4rem; letter-spacing: 1px;
      min-width: 36px; width: 36px; text-align: center; color: var(--muted); flex-shrink: 0; }
    .player-row.top-3 .rank { color: var(--accent); }
    .player-info { display: flex; align-items: center; gap: 10px; flex: 1; min-width: 0; }
    .player-avatar { width: 34px; height: 34px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-family: 'Bebas Neue', sans-serif; font-size: 0.88rem; letter-spacing: 1px; flex-shrink: 0;
      background: rgba(247,195,68,0.1); border: 1px solid rgba(247,195,68,0.22); color: var(--accent); }
    .name { font-weight: 700; font-size: 0.88rem; color: var(--text);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis; min-width: 0; }
    .total-score { font-family: 'Bebas Neue', sans-serif; font-size: 1.45rem; letter-spacing: 1px;
      color: var(--green); flex-shrink: 0; min-width: 58px; text-align: right; }
    .player-row.top-3 .total-score { color: var(--accent); }
    .breakdown-btn { font-size: 0.6rem; font-weight: 800; text-transform: uppercase; letter-spacing: 1px;
      padding: 5px 11px; border-radius: 8px; border: 1px solid var(--border);
      background: rgba(255,255,255,0.04); color: var(--muted); cursor: pointer;
      font-family: 'DM Sans', sans-serif; transition: all 0.2s; flex-shrink: 0; white-space: nowrap; }
    .breakdown-btn:hover, .breakdown-btn.open { border-color: rgba(247,195,68,0.4); color: var(--accent); background: rgba(247,195,68,0.08); }

    /* BREAKDOWN */
    .breakdown-wrap { overflow: hidden; max-height: 0; transition: max-height 0.35s cubic-bezier(0.4,0,0.2,1), opacity 0.25s ease; opacity: 0; }
    .breakdown-wrap.show { max-height: 600px; opacity: 1; }
    .breakdown { margin-top: 10px; padding: 16px; background: rgba(0,0,0,0.4);
      border: 1px solid rgba(247,195,68,0.12); border-radius: 12px; margin-bottom: 4px; }
    .breakdown-header { font-family: 'Bebas Neue', sans-serif; font-size: 0.78rem; letter-spacing: 3px;
      color: var(--accent); margin-bottom: 12px; padding-bottom: 8px;
      border-bottom: 1px solid rgba(247,195,68,0.12); }
    .breakdown-item { display: flex; justify-content: space-between; align-items: center;
      padding: 9px 0; border-bottom: 1px solid rgba(255,255,255,0.04); font-size: 0.82rem; gap: 8px; }
    .breakdown-item:last-child { border-bottom: none; padding-bottom: 0; }
    .game-name { color: var(--muted); font-weight: 500; min-width: 0; flex: 1;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .game-score { font-family: 'Bebas Neue', sans-serif; font-size: 1.1rem; letter-spacing: 1px; flex-shrink: 0; }
    .game-score.positive { color: var(--green); }
    .game-score.zero { color: var(--muted); }
    .breakdown-total { display: flex; justify-content: space-between; align-items: center;
      margin-top: 10px; padding: 10px 14px;
      background: rgba(247,195,68,0.06); border: 1px solid rgba(247,195,68,0.2);
      border-radius: 9px; font-size: 0.84rem; font-weight: 700; color: var(--text); }
    .breakdown-total-score { font-family: 'Bebas Neue', sans-serif; font-size: 1.4rem; letter-spacing: 1px; color: var(--accent); }

    /* ACTIONS */
    .actions { display: flex; gap: 14px; justify-content: center; flex-wrap: wrap; }
    .btn { display: inline-flex; align-items: center; gap: 8px; padding: 14px 30px;
      border: none; border-radius: 12px; font-family: 'DM Sans', sans-serif;
      font-size: 0.88rem; font-weight: 800; cursor: pointer; transition: all 0.22s ease;
      text-transform: uppercase; letter-spacing: 0.5px; text-decoration: none; position: relative; overflow: hidden; }
    .btn::after { content: ''; position: absolute; inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.14), transparent); opacity: 0; transition: opacity 0.22s; }
    .btn:hover::after { opacity: 1; }
    .btn-primary { background: var(--accent); color: #000; box-shadow: 0 6px 24px rgba(247,195,68,0.28); }
    .btn-primary:hover { background: #ffd060; transform: translateY(-2px); box-shadow: 0 10px 32px rgba(247,195,68,0.4); }
    .btn-secondary { background: var(--surface); color: var(--text); border: 1px solid var(--border2); }
    .btn-secondary:hover { border-color: rgba(247,195,68,0.4); transform: translateY(-2px); }

    @keyframes fadeUp { from{opacity:0;transform:translateY(18px)} to{opacity:1;transform:translateY(0)} }
    /* SHARE BUTTON */
    .btn-share { background: linear-gradient(135deg, rgba(247,195,68,0.18), rgba(232,64,64,0.15));
      color: var(--accent); border: 1px solid rgba(247,195,68,0.35); position: relative; overflow: hidden; }
    .btn-share:hover { background: linear-gradient(135deg, rgba(247,195,68,0.28), rgba(232,64,64,0.22));
      border-color: rgba(247,195,68,0.6); transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(247,195,68,0.2); }
    .share-copied { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
      background: rgba(61,214,140,0.92); color: #000; font-weight: 800; font-size: 0.82rem;
      border-radius: 12px; opacity: 0; pointer-events: none; transition: opacity 0.2s; }
    .share-copied.show { opacity: 1; }

    @media (max-width: 600px) {
      nav { padding: 0 16px; height: 56px; }
      .nav-logo { font-size: 1.35rem; }
      .nav-center-tag { font-size: 0.58rem; padding: 4px 10px; }
      .nav-home { font-size: 0.7rem; padding: 5px 12px; }
      .page { padding: 28px 14px 80px; }
      .hero-trophy { font-size: 3.5rem; }
      .hero-title { font-size: clamp(2rem, 7vw, 3rem); letter-spacing: 3px; }
      #podium { gap: 6px; padding: 0; width: 100%; }
      .podium-place { width: calc(33.333% - 4px); max-width: none; }
      .podium-medal { font-size: 1.5rem; margin-bottom: 5px; }
      .podium-player { padding: 10px 5px 9px; border-radius: 12px; }
      .podium-player-name { font-size: 0.66rem; }
      .podium-score { font-size: clamp(1.1rem, 4vw, 1.5rem); }
      .podium-pts { font-size: 0.48rem; }
      .podium-place.first .podium-block  { height: 68px; }
      .podium-place.second .podium-block { height: 46px; }
      .podium-place.third .podium-block  { height: 30px; }
      .leaderboard-wrap { padding: 16px 12px; border-radius: 16px; }
      .player-row { padding: 10px; gap: 8px; }
      .rank { font-size: 1.2rem; min-width: 30px; width: 30px; }
      .player-avatar { width: 30px; height: 30px; font-size: 0.75rem; }
      .name { font-size: 0.8rem; }
      .total-score { font-size: 1.2rem; min-width: 50px; }
      .breakdown-btn { font-size: 0.56rem; padding: 4px 9px; }
      .breakdown { padding: 12px; }
      .breakdown-item { font-size: 0.76rem; padding: 7px 0; }
      .game-score { font-size: 0.92rem; }
      .actions { flex-direction: column; padding: 0 8px; }
      .actions .btn { width: 100%; justify-content: center; }
    }
    @media (max-width: 380px) {
      nav { height: 52px; }
      .nav-logo { font-size: 1.2rem; }
      .nav-center-tag { font-size: 0.52rem; padding: 3px 8px; }
      .player-avatar { display: none; }
      .podium-score { font-size: 1rem; }
    }
  </style>
</head>
<body>
  <canvas id="confettiCanvas"></canvas>
  <div class="bg-layer"></div>
  <div class="noise"></div>

  <nav>
    <a href="index.html" class="nav-logo">🏏 Crickingo</a>
    <div class="nav-center-tag"><span class="tag-dot"></span>Results</div>
    <div class="nav-right"><a href="index.html" class="nav-home">← Home</a></div>
  </nav>

  <main class="page">
    <div class="hero">
      <span class="hero-trophy">🏆</span>
      <h1 class="hero-title">Tournament Complete!</h1>
      <p class="hero-sub">All games played · Final scores locked in</p>
      <div class="hero-tournament-name" id="tournamentName">Loading…</div>
    </div>

    <div class="podium-section">
      <div id="podium"></div>
    </div>

    <div class="leaderboard-wrap">
      <div class="leaderboard-title">📊 Full Leaderboard</div>
      <div id="leaderboard"></div>
    </div>

    <div class="actions">
      <button class="btn btn-primary" onclick="window.location.href='index.html'">🏠 Home</button>
      <button class="btn btn-share" id="shareResultBtn" onclick="shareResult()">
        📤 Share Result
        <span class="share-copied" id="shareCopied">✓ Saved!</span>
      </button>
      <button class="btn btn-secondary" onclick="window.location.href='tournament.html'">🔄 New Tournament</button>
    </div>
  </main>

  <script>
    (function() {
      const canvas = document.getElementById('confettiCanvas');
      const ctx = canvas.getContext('2d');
      const COLOURS = ['#F7C344','#E84040','#4F8EF7','#3DD68C','#c084fc','#fff'];
      let pieces = [], running = true;
      function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
      window.addEventListener('resize', resize); resize();
      function spawn(n) { for (let i=0;i<n;i++) pieces.push({ x:Math.random()*canvas.width, y:Math.random()*-90-10, w:Math.random()*13+6, h:Math.random()*8+3, rot:Math.random()*Math.PI*2, vx:(Math.random()-0.5)*3.5, vy:Math.random()*4.5+2, vr:(Math.random()-0.5)*0.18, col:COLOURS[Math.floor(Math.random()*COLOURS.length)], life:1, decay:Math.random()*0.006+0.004 }); }
      spawn(180); setTimeout(()=>spawn(130),700); setTimeout(()=>spawn(110),1400); setTimeout(()=>{running=false},6000);
      function draw() {
        ctx.clearRect(0,0,canvas.width,canvas.height);
        pieces = pieces.filter(p=>p.life>0.02);
        pieces.forEach(p=>{
          p.x+=p.vx; p.y+=p.vy; p.rot+=p.vr;
          if(p.y>canvas.height*0.65) p.life-=p.decay*2;
          else if(!running) p.life-=p.decay*0.5;
          ctx.save(); ctx.globalAlpha=Math.max(0,p.life);
          ctx.translate(p.x,p.y); ctx.rotate(p.rot);
          ctx.fillStyle=p.col; ctx.fillRect(-p.w/2,-p.h/2,p.w,p.h);
          ctx.restore();
        });
        if(pieces.length>0) requestAnimationFrame(draw);
      }
      draw();
    })();


    window.shareResult = async function() {
      const btn = document.getElementById('shareResultBtn');
      const copied = document.getElementById('shareCopied');

      // Build share text from leaderboard
      const rows = document.querySelectorAll('.player-row');
      const tName = document.getElementById('tournamentName')?.textContent || 'Crickingo Tournament';
      let lines = ['🏆 ' + tName, ''];
      const medals = ['🥇','🥈','🥉','4️⃣'];
      rows.forEach((row, i) => {
        const name  = row.querySelector('.name')?.textContent?.trim() || '';
        const score = row.querySelector('.total-score')?.textContent?.trim() || '';
        if (name) lines.push((medals[i] || (i+1+'.')) + ' ' + name + ' — ' + score + ' pts');
      });
      lines.push('');
      lines.push('🏏 Can you beat me? crickingo.vercel.app');
      const shareText = lines.join('\n');

      // Try canvas share card
      try {
        const W = 600, pad = 40;
        const playerLines = lines.filter(l => l.includes('—'));
        const H = 320 + playerLines.length * 48;
        const canvas = document.createElement('canvas');
        canvas.width = W * 2; canvas.height = H * 2;
        const ctx = canvas.getContext('2d'); ctx.scale(2, 2);

        // BG
        ctx.fillStyle = '#05070f'; ctx.fillRect(0, 0, W, H);
        const grad = ctx.createLinearGradient(0,0,W,0);
        grad.addColorStop(0,'#F7C344'); grad.addColorStop(0.5,'#E84040'); grad.addColorStop(1,'#4F8EF7');
        ctx.fillStyle = grad; ctx.fillRect(0, 0, W, 3);

        let y = pad + 14;
        ctx.textAlign = 'center'; ctx.font = 'bold 26px "Arial Black",Arial';
        ctx.fillStyle = 'rgba(240,240,240,0.5)'; ctx.fillText('CRICKINGO TOURNAMENT', W/2, y); y += 34;

        // Tournament name box
        ctx.fillStyle = 'rgba(247,195,68,0.12)';
        roundRect(ctx, pad, y, W-pad*2, 52, 10);
        ctx.font = 'bold 28px "Arial Black",Arial'; ctx.fillStyle = '#F7C344';
        ctx.fillText(tName, W/2, y+36); y += 68;

        // Players
        playerLines.forEach((line, i) => {
          const parts = line.split(' — ');
          const nameP = parts[0] || line;
          const scoreP = parts[1] || '';
          ctx.fillStyle = i === 0 ? 'rgba(247,195,68,0.12)' : 'rgba(255,255,255,0.04)';
          roundRect(ctx, pad, y, W-pad*2, 38, 8);
          ctx.textAlign = 'left'; ctx.font = '16px Arial'; ctx.fillStyle = 'rgba(240,240,240,0.85)';
          ctx.fillText(nameP, pad+14, y+24);
          if (scoreP) { ctx.textAlign = 'right'; ctx.fillStyle = i===0?'#F7C344':'#3DD68C'; ctx.fillText(scoreP, W-pad-14, y+24); }
          y += 46;
        });

        y += 10;
        ctx.fillStyle = 'rgba(247,195,68,0.08)'; roundRect(ctx, pad, y, W-pad*2, 48, 10);
        ctx.textAlign = 'center'; ctx.font = 'bold 14px Arial'; ctx.fillStyle = '#F7C344';
        ctx.fillText('🏏 crickingo.vercel.app', W/2, y+30);

        function roundRect(ctx, x, y, w, h, r) {
          ctx.beginPath(); ctx.moveTo(x+r,y); ctx.lineTo(x+w-r,y); ctx.quadraticCurveTo(x+w,y,x+w,y+r);
          ctx.lineTo(x+w,y+h-r); ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h); ctx.lineTo(x+r,y+h);
          ctx.quadraticCurveTo(x,y+h,x,y+h-r); ctx.lineTo(x,y+r); ctx.quadraticCurveTo(x,y,x+r,y);
          ctx.closePath(); ctx.fill();
        }

        canvas.toBlob(async (blob) => {
          const file = new File([blob], 'crickingo-tournament.png', {type:'image/png'});
          if (navigator.share && navigator.canShare && navigator.canShare({files:[file]})) {
            try { await navigator.share({files:[file], text: shareText}); return; }
            catch(e) { if (e.name==='AbortError') return; }
          }
          // Fallback: download
          const url = URL.createObjectURL(blob);
          const a = document.createElement('a'); a.href=url; a.download='crickingo-tournament.png';
          document.body.appendChild(a); a.click(); document.body.removeChild(a); URL.revokeObjectURL(url);
          if (copied) { copied.classList.add('show'); setTimeout(()=>copied.classList.remove('show'), 2000); }
        }, 'image/png');

      } catch(err) {
        // Text fallback
        if (navigator.share) { try { await navigator.share({text: shareText}); return; } catch(e) {} }
        await navigator.clipboard.writeText(shareText).catch(()=>{});
        if (copied) { copied.classList.add('show'); setTimeout(()=>copied.classList.remove('show'), 2000); }
      }
    };
    window.toggleBreakdown = function(btn, rowEl) {
      const wrap = rowEl.querySelector('.breakdown-wrap');
      if (!wrap) return;
      const isOpen = wrap.classList.contains('show');
      document.querySelectorAll('.breakdown-wrap.show').forEach(w => {
        w.classList.remove('show');
        const b = w.closest('.player-row')?.querySelector('.breakdown-btn');
        if (b) { b.classList.remove('open'); b.textContent = 'Details'; }
      });
      if (!isOpen) { wrap.classList.add('show'); btn.classList.add('open'); btn.textContent = 'Hide'; }
    };
  </script>

  <script type="module" src="tour-result.js"></script>
